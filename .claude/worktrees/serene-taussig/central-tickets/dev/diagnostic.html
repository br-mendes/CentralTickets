<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Diagnostic - Central Tickets</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
    <h1>🔍 Supabase Diagnostic</h1>
    <div id="output"></div>

    <script src="config.js"></script>
    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            output.appendChild(div);
            console.log(msg);
        }
        
        async function runDiagnostics() {
            log('=== Supabase Connection Test ===', 'info');
            log(`URL: ${SUPABASE_URL}`, 'info');
            log(`Key: ${SUPABASE_ANON_KEY.substring(0, 20)}...`, 'info');
            
            try {
                // Test connection
                log('\n--- Testing Connection ---', 'info');
                const { data: connectionTest, error: connectionError } = await sb
                    .from('tickets_cache')
                    .select('count', { count: 'exact', head: true });
                
                if (connectionError) {
                    log(`Connection Error: ${connectionError.message}`, 'error');
                } else {
                    log('✅ Connection successful!', 'success');
                }
                
                // Get table info - try to get a sample
                log('\n--- Checking tickets_cache table ---', 'info');
                const { data: sampleData, error: sampleError } = await sb
                    .from('tickets_cache')
                    .select('*')
                    .limit(1);
                
                if (sampleError) {
                    log(`Error accessing tickets_cache: ${sampleError.message}`, 'error');
                } else {
                    log(`✅ tickets_cache accessible. Sample row:`, 'success');
                    console.log('Sample:', sampleData);
                    
                    if (sampleData && sampleData.length > 0) {
                        log('\n--- Table Structure (first row keys) ---', 'info');
                        const keys = Object.keys(sampleData[0]);
                        log('Columns: ' + keys.join(', '), 'info');
                    }
                }
                
                // Check row count
                log('\n--- Row Count ---', 'info');
                const { count, error: countError } = await sb
                    .from('tickets_cache')
                    .select('*', { count: 'exact', head: true });
                
                if (countError) {
                    log(`Error getting count: ${countError.message}`, 'error');
                } else {
                    log(`Total rows in tickets_cache: ${count}`, 'success');
                }
                
                // Try to get some sample data with different fields
                log('\n--- Sample Data Analysis ---', 'info');
                const { data: dataSamples, error: dataError } = await sb
                    .from('tickets_cache')
                    .select('*')
                    .limit(3);
                
                if (!dataError && dataSamples && dataSamples.length > 0) {
                    dataSamples.forEach((row, i) => {
                        log(`\nRow ${i + 1}:`, 'info');
                        for (const [key, value] of Object.entries(row)) {
                            const displayValue = typeof value === 'object' ? JSON.stringify(value) : value;
                            log(`  ${key}: ${displayValue}`, 'info');
                        }
                    });
                }
                
                // Check if columns match expected schema
                log('\n--- Schema Validation ---', 'info');
                const expectedColumns = [
                    'id', 'ticket_id', 'instance', 'title', 'entity', 'entity_full',
                    'category', 'root_category', 'status_id', 'status_key', 'status_name',
                    'group_name', 'date_created', 'date_mod', 'due_date', 'is_sla_late',
                    'raw_data', 'last_sync', 'created_at', 'updated_at'
                ];
                
                if (dataSamples && dataSamples.length > 0) {
                    const actualColumns = Object.keys(dataSamples[0]);
                    log('Expected columns: ' + expectedColumns.join(', '), 'info');
                    log('Actual columns: ' + actualColumns.join(', '), 'info');
                    
                    const missing = expectedColumns.filter(c => !actualColumns.includes(c));
                    const extra = actualColumns.filter(c => !expectedColumns.includes(c));
                    
                    if (missing.length > 0) {
                        log(`⚠️ Missing columns: ${missing.join(', ')}`, 'warning');
                    }
                    if (extra.length > 0) {
                        log(`⚠️ Extra columns: ${extra.join(', ')}`, 'warning');
                    }
                    if (missing.length === 0 && extra.length === 0) {
                        log('✅ Schema matches expected!', 'success');
                    }
                }
                
                // Check sync_control table
                log('\n--- Checking sync_control table ---', 'info');
                const { data: syncData, error: syncError } = await sb
                    .from('sync_control')
                    .select('*');
                
                if (syncError) {
                    log(`Error accessing sync_control: ${syncError.message}`, 'error');
                } else {
                    log(`✅ sync_control accessible. Rows: ${syncData?.length || 0}`, 'success');
                    if (syncData && syncData.length > 0) {
                        log('Data:', 'info');
                        console.log(syncData);
                    }
                }
                
            } catch (err) {
                log(`Fatal Error: ${err.message}`, 'error');
                console.error(err);
            }
        }
        
        runDiagnostics();
    </script>
</body>
</html>
