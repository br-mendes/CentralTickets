<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronização Inicial - Central de Tickets</title>
    <link rel="icon" href="favicon-peta.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 svg { width: 28px; height: 28px; color: #2563eb; }
        .subtitle { color: #64748b; margin-bottom: 24px; font-size: 0.9rem; }
        
        .status-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .status-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-badge.running { background: #dbeafe; color: #2563eb; }
        .status-badge.success { background: #d1fae5; color: #059669; }
        .status-badge.error { background: #fee2e2; color: #dc2626; }
        
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            background: #2563eb;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            width: 100%;
            justify-content: center;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn svg { width: 18px; height: 18px; }
        
        .log-container {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-line { margin-bottom: 4px; display: flex; gap: 8px; }
        .log-time { color: #64748b; }
        .log-info { color: #60a5fa; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warning { color: #fbbf24; }
        
        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        .summary-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2563eb;
        }
        .summary-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 0 1 9-9"/>
            </svg>
            Sincronização Inicial
        </h1>
        <p class="subtitle">Sincronizar todos os tickets do GLPI para o Supabase</p>

        <div class="input-group">
            <label>Supabase URL</label>
            <input type="text" id="supabaseUrl" value="https://zyigzxkwnltudojumhpq.supabase.co">
        </div>
        <div class="input-group">
            <label>Supabase Anon Key (público)</label>
            <input type="text" id="supabaseKey" value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5aWd6eGt3bmx0dWRvanVtaHBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk1MzM5MTEsImV4cCI6MjA4NTEwOTkxMX0.jXi-9YraRsebeuiDQzWpRHzbqZc4qdTC_J1u6K_bjwk">
        </div>

        <div class="status-card">
            <div class="status-header">
                <span class="status-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>
                    PETA
                </span>
                <span class="status-badge pending" id="petaStatus">Aguardando</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="petaProgress" style="width: 0%"></div>
            </div>
            <span class="progress-text" id="petaProgressText">0 / 0 tickets</span>
        </div>

        <div class="status-card">
            <div class="status-header">
                <span class="status-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    GMX
                </span>
                <span class="status-badge pending" id="gmxStatus">Aguardando</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="gmxProgress" style="width: 0%"></div>
            </div>
            <span class="progress-text" id="gmxProgressText">0 / 0 tickets</span>
        </div>

        <div class="summary" id="summary" style="display: none;">
            <div class="summary-item">
                <div class="summary-value" id="totalTickets">0</div>
                <div class="summary-label">Total Tickets</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="totalSynced">0</div>
                <div class="summary-label">Sincronizados</div>
            </div>
        </div>

        <button class="btn btn-primary" id="syncBtn" onclick="startSync()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </svg>
            Iniciar Sincronização
        </button>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script src="config.js"></script>
    <script>
        const INSTANCES = {
            'Peta': {
                BASE_URL: 'https://glpi.petacorp.com.br/apirest.php',
                USER_TOKEN: 'PveUan5K0TcmshIlTOmB3x9QqGON2AGwI7AXTwOS',
                APP_TOKEN: 'guhEhrBwOaU1Wk6ETIuWc2jZf3tVkL7VWd62oz51',
            },
            'GMX': {
                BASE_URL: 'https://glpi.gmxtecnologia.com.br/apirest.php',
                USER_TOKEN: 'b8WgBZm1upQDj3BYaKMePRXRSyywM6n8xkytzRph',
                APP_TOKEN: 'whm88xUDeRBEamJi1IeRhRGFmixdIVouoNdCuBpF',
            }
        };

        const STATUS_MAP = {
            1: { key: 'new', name: 'Novo' },
            2: { key: 'processing', name: 'Em atendimento' },
            3: { key: 'processing', name: 'Em atendimento' },
            4: { key: 'pending', name: 'Pendente' },
            5: { key: 'solved', name: 'Solucionado' },
            6: { key: 'closed', name: 'Fechado' },
        };

        let sessionTokens = {};
        let syncStats = { peta: { total: 0, synced: 0 }, gmx: { total: 0, synced: 0 } };

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString('pt-BR');
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${message}</span>`;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(instance, status, progress, current, total) {
            const statusEl = document.getElementById(`${instance.toLowerCase()}Status`);
            const progressEl = document.getElementById(`${instance.toLowerCase()}Progress`);
            const textEl = document.getElementById(`${instance.toLowerCase()}ProgressText`);

            statusEl.className = `status-badge ${status}`;
            statusEl.textContent = status === 'running' ? 'Sincronizando...' : 
                                  status === 'success' ? 'Concluído' : 
                                  status === 'error' ? 'Erro' : 'Aguardando';
            
            if (progress !== null) {
                progressEl.style.width = `${progress}%`;
                textEl.textContent = `${current} / ${total} tickets`;
            }
        }

        async function initSession(instanceName) {
            const instance = INSTANCES[instanceName];
            try {
                const response = await fetch(`${instance.BASE_URL}/initSession`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `user_token ${instance.USER_TOKEN}`,
                        'App-Token': instance.APP_TOKEN,
                    },
                });
                if (!response.ok) throw new Error(`Erro ao iniciar sessão`);
                const data = await response.json();
                sessionTokens[instanceName] = data.session_token;
                return data.session_token;
            } catch (error) {
                log(`Erro ao autenticar ${instanceName}: ${error.message}`, 'error');
                throw error;
            }
        }

        async function getTicketsFromGLPI(instanceName) {
            const instance = INSTANCES[instanceName];
            if (!sessionTokens[instanceName]) {
                await initSession(instanceName);
            }

            const allTickets = [];
            let page = 0;
            const pageSize = 100;

            log(`Buscando tickets de ${instanceName}...`, 'info');

            while (true) {
                const start = page * pageSize;
                const end = start + pageSize - 1;

                const searchParams = new URLSearchParams({
                    'range': `${start}-${end}`,
                    'expand_dropdowns': 'true',
                    'get_hateoas': 'false',
                });

                try {
                    const response = await fetch(
                        `${instance.BASE_URL}/search/Ticket?${searchParams.toString()}`,
                        {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': instance.APP_TOKEN,
                            },
                        }
                    );

                    if (!response.ok) {
                        if (response.status === 401) {
                            sessionTokens[instanceName] = null;
                            await initSession(instanceName);
                            continue;
                        }
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data.data || data.data.length === 0) break;

                    allTickets.push(...data.data);
                    log(`  Página ${page + 1}: ${data.data.length} tickets`, 'info');
                    page++;
                    if (page >= 50) break; // Limite de segurança
                } catch (error) {
                    log(`Erro na página ${page + 1}: ${error.message}`, 'error');
                    break;
                }
            }

            return allTickets;
        }

        function processTicket(ticket, instanceName) {
            const statusId = parseInt(ticket[12]) || 1;
            const statusInfo = STATUS_MAP[statusId] || STATUS_MAP[1];
            
            const entityFull = ticket[80] || '';
            let entity = entityFull;
            if (instanceName === 'Peta') {
                entity = entityFull.replace(/^PETA\s*GRUPO\s*>\s*/gi, '').trim();
            } else if (instanceName === 'GMX') {
                entity = entityFull.replace(/^GMX\s*TECNOLOGIA\s*>\s*/gi, '').trim();
            }

            const category = ticket[7] || 'Não categorizado';
            const rootCategory = category.split(' > ')[0] || category;
            const dueDate = ticket[151];
            const isSlaLate = dueDate ? new Date(dueDate) < new Date() : false;
            const dateCreated = ticket.date_creation || ticket[15];
            const dateMod = ticket.date_mod || ticket[19] || ticket[91] || dateCreated;

            return {
                ticket_id: parseInt(ticket[2]) || ticket.id,
                instance: instanceName,
                title: ticket[1] || 'Sem título',
                entity: entity || entityFull,
                entity_full: entityFull,
                category: category,
                root_category: rootCategory,
                status_id: statusId,
                status_key: statusInfo.key,
                status_name: statusInfo.name,
                group_name: ticket[8] || 'Não atribuído',
                date_created: dateCreated,
                date_mod: dateMod,
                due_date: dueDate,
                is_sla_late: isSlaLate,
                last_sync: new Date().toISOString(),
            };
        }

        async function syncToSupabase(tickets, instanceName, supabase) {
            log(`Sincronizando ${tickets.length} tickets de ${instanceName}...`, 'info');
            
            const batchSize = 50;
            let synced = 0;

            for (let i = 0; i < tickets.length; i += batchSize) {
                const batch = tickets.slice(i, i + batchSize);
                
                const { error } = await supabase
                    .from('tickets_cache')
                    .upsert(batch, { onConflict: 'ticket_id,instance' });

                if (error) {
                    log(`Erro no batch ${i/batchSize + 1}: ${error.message}`, 'error');
                } else {
                    synced += batch.length;
                    const progress = (synced / tickets.length) * 100;
                    updateStatus(instanceName, 'running', progress, synced, tickets.length);
                    log(`  Sincronizado ${synced}/${tickets.length}`, 'success');
                }
            }

            return synced;
        }

        async function startSync() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Sincronizando...';

            const supabaseUrl = document.getElementById('supabaseUrl').value;
            const supabaseKey = document.getElementById('supabaseKey').value;

            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            log('=== INICIANDO SINCRONIZAÇÃO ===', 'info');
            syncStats = { peta: { total: 0, synced: 0 }, gmx: { total: 0, synced: 0 } };

            try {
                // Sincronizar PETA
                log('', 'info');
                log('>>> Sincronizando PETA', 'info');
                updateStatus('peta', 'running', 0, 0, 0);
                
                const petaTickets = await getTicketsFromGLPI('Peta');
                syncStats.peta.total = petaTickets.length;
                log(`Total de tickets PETA: ${petaTickets.length}`, 'success');

                const petaProcessed = petaTickets.map(t => processTicket(t, 'Peta'));
                syncStats.peta.synced = await syncToSupabase(petaProcessed, 'peta', supabase);
                updateStatus('peta', 'success', 100, syncStats.peta.synced, syncStats.peta.total);
                log(`PETA: ${syncStats.peta.synced} tickets sincronizados`, 'success');

                // Sincronizar GMX
                log('', 'info');
                log('>>> Sincronizando GMX', 'info');
                updateStatus('gmx', 'running', 0, 0, 0);

                const gmxTickets = await getTicketsFromGLPI('GMX');
                syncStats.gmx.total = gmxTickets.length;
                log(`Total de tickets GMX: ${gmxTickets.length}`, 'success');

                const gmxProcessed = gmxTickets.map(t => processTicket(t, 'GMX'));
                syncStats.gmx.synced = await syncToSupabase(gmxProcessed, 'gmx', supabase);
                updateStatus('gmx', 'success', 100, syncStats.gmx.synced, syncStats.gmx.total);
                log(`GMX: ${syncStats.gmx.synced} tickets sincronizados`, 'success');

        // Atualizar sync_control
        await supabase.from('sync_control').upsert([
            { instance: 'PETA', last_sync: new Date().toISOString(), status: 'success', tickets_count: syncStats.peta.synced, last_page: 999, total_pages: 1 },
            { instance: 'GMX', last_sync: new Date().toISOString(), status: 'success', tickets_count: syncStats.gmx.synced, last_page: 999, total_pages: 1 },
        ], { onConflict: 'instance' });

                // Mostrar resumo
                document.getElementById('summary').style.display = 'grid';
                document.getElementById('totalTickets').textContent = syncStats.peta.total + syncStats.gmx.total;
                document.getElementById('totalSynced').textContent = syncStats.peta.synced + syncStats.gmx.synced;

                log('', 'info');
                log('=== SINCRONIZAÇÃO CONCLUÍDA ===', 'success');
                log(`Total: ${syncStats.peta.synced + syncStats.gmx.synced} tickets`, 'success');

            } catch (error) {
                log(`ERRO: ${error.message}`, 'error');
                updateStatus('peta', 'error', 0, 0, 0);
                updateStatus('gmx', 'error', 0, 0, 0);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg> Reiniciar Sincronização';
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
