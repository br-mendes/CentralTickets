<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Technicians to Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
        .log { background: #f4f4f4; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
        button { padding: 10px 20px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🔄 Sincronizar Técnicos para Supabase</h1>
    <p>Este script busca os nomes dos técnicos da API GLPI e salva no banco Supabase.</p>
    
    <button onclick="startSync()">Iniciar Sincronização</button>
    <button onclick="syncGMX()">Sincronizar GMX</button>
    
    <div id="log" class="log">Aguardando...</div>
    <div id="stats"></div>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5aWd6eGt3bmx0dWRvanVtaHBxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2OTUzMzkxMSwiZXhwIjoyMDg1MTA5OTExfQ.WF6vR3sAlu0sdwE9pwe2iLQD8uFPNtiOpYH8hdSarE8';
        
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
        
        const GLPI_CONFIG = {
            'Peta': {
                BASE_URL: 'https://glpi.petacorp.com.br/apirest.php',
                USER_TOKEN: 'PveUan5K0TcmshIlTOmB3x9QqGON2AGwI7AXTwOS',
                APP_TOKEN: 'guhEhrBwOaU1Wk6ETIuWc2jZf3tVkL7VWd62oz51'
            },
            'GMX': {
                BASE_URL: 'https://glpi.gmxtecnologia.com.br/apirest.php',
                USER_TOKEN: 'b8WgBZm1upQDj3BYaKMePRXRSyywM6n8xkytzRph',
                APP_TOKEN: 'whm88xUDeRBEamJi1IeRhRGFmixdIVouoNdCuBpF'
            }
        };
        
        let sessionTokens = {};
        
        function log(msg, type = 'info') {
            const div = document.getElementById('log');
            div.textContent += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
            console.log(msg);
        }
        
        async function initGLPISession(instance) {
            if (sessionTokens[instance]) return sessionTokens[instance];
            
            const config = GLPI_CONFIG[instance];
            const response = await fetch(`${config.BASE_URL}/initSession`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `user_token ${config.USER_TOKEN}`,
                    'App-Token': config.APP_TOKEN,
                },
            });
            
            const data = await response.json();
            sessionTokens[instance] = data.session_token;
            return data.session_token;
        }
        
        async function getTechnicianForTicket(ticketId, instance) {
            const config = GLPI_CONFIG[instance];
            const sessionToken = await initGLPISession(instance);
            
            try {
                const response = await fetch(
                    `${config.BASE_URL}/Ticket/${ticketId}/Ticket_User`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Session-Token': sessionToken,
                            'App-Token': config.APP_TOKEN,
                        },
                    }
                );
                
                if (!response.ok) return null;
                
                const actors = await response.json();
                if (!Array.isArray(actors)) return null;
                
                const technician = actors.find(a => a.type === 2);
                if (!technician || !technician.users_id) return null;
                
                const userResponse = await fetch(
                    `${config.BASE_URL}/User/${technician.users_id}`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Session-Token': sessionToken,
                            'App-Token': config.APP_TOKEN,
                        },
                    }
                );
                
                if (!userResponse.ok) return null;
                
                const user = await userResponse.json();
                const name = [user.firstname, user.realname].filter(Boolean).join(' ') || user.name || '';
                
                return { id: technician.users_id, name };
            } catch (e) {
                log(`Erro ticket ${ticketId}: ${e.message}`, 'error');
                return null;
            }
        }
        
        async function syncInstance(instance, limit = 100) {
            log(`🔄 Buscando tickets sem technician para ${instance}...`);
            
            const { data: tickets, error } = await sb
                .from('tickets_cache')
                .select('id, ticket_id')
                .eq('instance', instance)
                .is('technician', null)
                .limit(limit);
            
            if (error) {
                log(`Erro ao buscar tickets: ${error.message}`, 'error');
                return 0;
            }
            
            if (!tickets || tickets.length === 0) {
                log(`✅ Não há tickets para sincronizar em ${instance}`);
                return 0;
            }
            
            log(`📊 Encontrados ${tickets.length} tickets para sincronizar`);
            
            let updated = 0;
            for (let i = 0; i < tickets.length; i++) {
                const ticket = tickets[i];
                log(`[${i+1}/${tickets.length}] Processando ticket #${ticket.ticket_id}...`);
                
                const tech = await getTechnicianForTicket(ticket.ticket_id, instance);
                
                if (tech && tech.name) {
                    await sb
                        .from('tickets_cache')
                        .update({ technician: tech.name })
                        .eq('id', ticket.id);
                    
                    updated++;
                    log(`   ✅ Atualizado: ${tech.name}`, 'success');
                } else {
                    log(`   ⚪ Sem técnico atribuído`);
                }
                
                // Small delay to avoid rate limiting
                await new Promise(r => setTimeout(r, 100));
            }
            
            return updated;
        }
        
        async function startSync() {
            log('🚀 Iniciando sincronização para Peta...');
            const count = await syncInstance('Peta', 100);
            document.getElementById('stats').innerHTML += `<p class="success">Peta: ${count} técnicos sincronizados</p>`;
        }
        
        async function syncGMX() {
            log('🚀 Iniciando sincronização para GMX...');
            const count = await syncInstance('GMX', 100);
            document.getElementById('stats').innerHTML += `<p class="success">GMX: ${count} técnicos sincronizados</p>`;
        }
    </script>
</body>
</html>
