<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets em Espera - Central de Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="glpi-technician.js"></script>
    <script src="shared-header.js"></script>
    <script src="utils.js"></script>
    <script src="incremental-loader.js"></script>
    <script src="dashboard-utils.js"></script>
    <script src="cache-manager.js"></script>
    <script src="supabase-cache.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
    </script>
    <style>
        .main {
            max-width: 1800px !important;
            margin-left: auto !important;
            margin-right: auto !important;
            padding: 24px !important;
            width: 100% !important;
        }

        .table-responsive {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 90vw !important;
            margin: 0 auto !important;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
        }

        .table-responsive table {
            width: 100% !important;
            table-layout: fixed;
            min-width: 1350px;
        }

        th, td {
            padding: 14px 12px !important;
            text-align: left !important;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-3xl font-bold flex items-center gap-3 text-[var(--text-primary)]">
                Tickets em Espera
            </h1>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-sm text-[var(--text-muted)]">Total em espera</p>
                    <p id="totalBigCount" class="text-4xl font-bold text-orange-600">0</p>
                </div>
                <div id="lastUpdate" class="text-sm text-[var(--text-muted)]"></div>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr class="bg-[var(--surface)] border-b border-[var(--border)]">
                        <th class="col-id">ID</th>
                        <th class="col-title">Título</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-technician">Técnico</th>
                        <th class="col-group">Grupo Responsável</th>
                        <th class="col-status">Status</th>
                        <th class="col-date">Tempo em Espera</th>
                    </tr>
                </thead>
                <tbody id="esperaTableBody" class="divide-y divide-[var(--border)]"></tbody>
            </table>
        </div>
    </main>

    <script>
        function calculateHoursSinceUpdate(lastUpdate) {
            if (!lastUpdate) return 999;
            const diffMs = Date.now() - new Date(lastUpdate).getTime();
            return Math.floor(diffMs / (1000 * 60 * 60));
        }

        function getUnifiedStatus(status) {
            if (!status) return 'new';
            const s = status.toLowerCase();
            if (s.includes('atendimento') || s.includes('processing')) return 'processing';
            return s;
        }

        async function loadEsperaTickets() {
            const tbody = document.getElementById('esperaTableBody');
            const totalBigCountEl = document.getElementById('totalBigCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-16">Carregando tickets em espera...</td></tr>';

            try {
                // Load ALL tickets with pagination (no limit)
                const allTickets = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await window._sb
                        .from('tickets_cache')
                        .select('*')
                        .eq('status_key', 'pending')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        allTickets.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                tbody.innerHTML = '';

                const total = allTickets.length;
                totalBigCountEl.textContent = total;
                lastUpdateEl.textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-16">Nenhum ticket em espera.</td></tr>';
                    return;
                }

                allTickets.forEach(ticket => {
                    const hours = calculateHoursSinceUpdate(ticket.date_mod || ticket.lastUpdate);
                    let rowClass = '';
                    if (hours > 72) rowClass = 'alert-red';
                    else if (hours > 24) rowClass = 'alert-yellow';

                    const timeText = hours > 72 ? `${hours}h (crítico)` : 
                                   hours > 24 ? `${hours}h (atrasado)` : `${hours}h`;

                    const row = document.createElement('tr');
                    row.className = rowClass;
                    row.innerHTML = `
                        <td class="col-id font-medium">#${ticket.ticket_id || ticket.id}</td>
                        <td class="col-title truncate" title="${ticket.title || ''}">${ticket.title || 'Sem título'}</td>
                        <td class="col-entity">${ticket.entity || '—'}</td>
                        <td class="col-technician">${ticket.technician || 'Não atribuído'}</td>
                        <td class="col-group">${(ticket.group_name || '').split('>').pop().trim() || '—'}</td>
                        <td class="col-status">
                            <span class="status-badge processing">Em atendimento</span>
                        </td>
                        <td class="col-date font-medium">${timeText}</td>
                    `;
                    tbody.appendChild(row);
                });

                initGlobalFilters(allTickets);

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-16 text-red-600">Erro ao carregar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.renderSharedHeader === 'function') window.renderSharedHeader();
            if (typeof window.initTheme === 'function') window.initTheme();
            loadEsperaTickets();
            setInterval(loadEsperaTickets, 3 * 60 * 1000);
        });
    </script>
</body>
</html>
