<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets em Espera - Central de Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="glpi-technician.js"></script>
    <script src="shared-header.js"></script>
    <script src="utils.js"></script>
    <script src="incremental-loader.js"></script>
    <script src="dashboard-utils.js"></script>
    <script src="cache-manager.js"></script>
    <script src="supabase-cache.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));
    </script>
</head>
<body>
    <header class="header"></header>

    <main class="main p-6 max-w-[1800px] mx-auto">
        <div class="mb-8">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                Tickets em Espera
                <span id="totalCount" class="text-lg font-semibold text-[var(--text-secondary)]"></span>
            </h1>
        </div>

        <div class="rounded-lg border border-[var(--border)] p-6 mb-6 flex items-center justify-between bg-[var(--surface)]">
            <div>
                <p class="text-sm text-[var(--text-muted)]">Total de tickets em espera</p>
                <p id="totalBigCount" class="text-4xl font-bold text-orange-600">0</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-[var(--text-muted)]">Atualizado agora</p>
                <span id="lastUpdate" class="text-sm font-medium"></span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="w-full">
                <thead>
                    <tr class="bg-[var(--surface)]">
                        <th class="col-id text-left">ID</th>
                        <th class="col-title text-left">Título</th>
                        <th class="col-entity text-left">Entidade</th>
                        <th class="col-technician text-left">Técnico</th>
                        <th class="col-group text-left">Grupo Responsável</th>
                        <th class="col-status text-left">Status</th>
                        <th class="col-date text-left">Tempo em Espera</th>
                    </tr>
                </thead>
                <tbody id="esperaTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        function calculateHoursSinceUpdate(lastUpdate) {
            if (!lastUpdate) return 999;
            const diffMs = Date.now() - new Date(lastUpdate).getTime();
            return Math.floor(diffMs / (1000 * 60 * 60));
        }

        function getUnifiedStatus(status) {
            if (!status) return 'new';
            const s = status.toLowerCase();
            if (s.includes('atendimento') || s.includes('processing')) return 'processing';
            return s;
        }

        async function loadEsperaTickets() {
            const tbody = document.getElementById('esperaTableBody');
            const totalCountEl = document.getElementById('totalCount');
            const totalBigCountEl = document.getElementById('totalBigCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12">Carregando tickets em espera...</td></tr>';

            try {
                // Load ALL tickets with pagination
                const allTickets = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await window._sb
                        .from('tickets_cache')
                        .select('*')
                        .eq('status_key', 'pending')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        allTickets.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                const total = allTickets.length;
                totalCountEl.textContent = `(${total} tickets)`;
                totalBigCountEl.textContent = total;
                lastUpdateEl.textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12">Nenhum ticket em espera.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';

                allTickets.forEach(ticket => {
                    const hours = calculateHoursSinceUpdate(ticket.date_mod || ticket.lastUpdate);
                    let rowClass = '';
                    if (hours > 72) rowClass = 'alert-red';
                    else if (hours > 24) rowClass = 'alert-yellow';

                    const timeText = hours > 72 ? `${hours}h (crítico)` : 
                                   hours > 24 ? `${hours}h (atrasado)` : `${hours}h`;

                    const row = document.createElement('tr');
                    row.className = rowClass;
                    row.innerHTML = `
                        <td class="col-id font-medium">#${ticket.ticket_id || ticket.id}</td>
                        <td class="col-title" title="${ticket.title || ''}">${ticket.title || 'Sem título'}</td>
                        <td class="col-entity">${ticket.entity || '—'}</td>
                        <td class="col-technician">${ticket.technician || 'Não atribuído'}</td>
                        <td class="col-group">${(ticket.group_name || '').split('>').pop().trim() || '—'}</td>
                        <td class="col-status">
                            <span class="status-badge processing">Em atendimento</span>
                        </td>
                        <td class="col-date font-medium">${timeText}</td>
                    `;
                    tbody.appendChild(row);
                });

                initGlobalFilters(allTickets);

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-red-600">Erro ao carregar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.renderSharedHeader === 'function') window.renderSharedHeader();
            if (typeof window.initTheme === 'function') window.initTheme();
            loadEsperaTickets();
            setInterval(loadEsperaTickets, 3 * 60 * 1000);
        });
    </script>
</body>
</html>
