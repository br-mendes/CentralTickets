<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets em Espera - Central de Tickets</title>
    
    <!-- 1. CSS PRINCIPAL primeiro -->
    <link rel="stylesheet" href="global.css">
    
    <!-- Scripts base (ordem importa!) -->
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. shared-header.js POR ÚLTIMO (injeta header) -->
    <script src="shared-header.js"></script>
</head>
<body>
    <!-- Header será injetado automaticamente pelo shared-header.js -->
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Tickets em Espera</h1>
            <span id="totalCount" class="text-lg text-muted"></span>
        </div>

        <div class="rounded-lg border p-4 mb-4 flex justify-between items-center bg-surface">
            <div>
                <p class="text-sm text-muted">Total em espera</p>
                <p id="totalBigCount" class="text-4xl font-bold text-orange-600">0</p>
            </div>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-title">Título</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-technician">Técnico</th>
                        <th class="col-group">Grupo</th>
                        <th class="col-status">Status</th>
                        <th class="col-time">Tempo Espera</th>
                    </tr>
                </thead>
                <tbody id="esperaTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        // Inicializar Supabase client
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        function calculateHoursSinceUpdate(lastUpdate) {
            if (!lastUpdate) return 999;
            return Math.floor((Date.now() - new Date(lastUpdate).getTime()) / (1000 * 60 * 60));
        }

        async function loadEsperaTickets() {
            const tbody = document.getElementById('esperaTableBody');
            const totalCountEl = document.getElementById('totalCount');
            const totalBigCountEl = document.getElementById('totalBigCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8">Carregando...</td></tr>';

            try {
                // Load ALL tickets with pagination
                const allTickets = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await sbClient
                        .from('tickets_cache')
                        .select('*')
                        .eq('status_key', 'pending')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;
                    if (data?.length > 0) {
                        allTickets.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                const total = allTickets.length;
                totalCountEl.textContent = `(${total})`;
                totalBigCountEl.textContent = total;
                lastUpdateEl.textContent = new Date().toLocaleTimeString('pt-BR');

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8">Nenhum ticket em espera.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                allTickets.forEach(t => {
                    const hours = calculateHoursSinceUpdate(t.date_mod || t.lastUpdate);
                    let rowClass = hours > 72 ? 'alert-red' : hours > 24 ? 'alert-yellow' : '';
                    const timeText = hours > 72 ? `${hours}h (crítico)` : hours > 24 ? `${hours}h (atrasado)` : `${hours}h`;

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="col-id font-medium">#${t.ticket_id || t.id}</td>
                        <td class="col-title" title="${t.title}">${t.title || '-'}</td>
                        <td class="col-entity">${t.entity || '-'}</td>
                        <td class="col-technician">${t.technician || 'Não atribuído'}</td>
                        <td class="col-group">${(t.group_name || '').split('>').pop().trim() || '-'}</td>
                        <td class="col-status"><span class="status-badge processing">Em atendimento</span></td>
                        <td class="col-time font-medium">${timeText}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-red-600 py-8">Erro ao carregar.</td></tr>';
            }
        }

        // OREM EXATA: Espera shared-header.js injetar ANTES de carregar tickets
        document.addEventListener('DOMContentLoaded', () => {
            // Aguarda header ser injetado
            setTimeout(() => {
                loadEsperaTickets();
                // Auto-refresh a cada 3 minutos
                setInterval(loadEsperaTickets, 3 * 60 * 1000);
            }, 100);
        });
    </script>
</body>
</html>
