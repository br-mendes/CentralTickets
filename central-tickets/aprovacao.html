<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação - Central de Tickets</title>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared-header.js"></script>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Tickets em Aprovação</h1>
            <span id="totalCount" class="text-lg text-muted"></span>
        </div>

        <div class="rounded-lg border p-4 mb-4 flex justify-between items-center bg-surface">
            <div>
                <p class="text-sm text-muted">Total aguardando aprovação</p>
                <p id="totalBigCount" class="text-4xl font-bold text-orange-600">0</p>
            </div>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-title">Título</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-technician">Solicitante</th>
                        <th class="col-date">Data Solicitação</th>
                        <th class="col-status">Status Aprovação</th>
                    </tr>
                </thead>
                <tbody id="aprovacaoTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        async function loadAprovacao() {
            const tbody = document.getElementById('aprovacaoTableBody');
            const totalCountEl = document.getElementById('totalCount');
            const totalBigCountEl = document.getElementById('totalBigCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">Carregando...</td></tr>';

            try {
                const { data, error } = await sbClient
                    .from('tickets_cache')
                    .select('*')
                    .eq('status_key', 'pending')
                    .order('date_mod', { ascending: false })
                    .limit(500);

                if (error) throw error;

                const total = data.length;
                totalCountEl.textContent = `(${total})`;
                totalBigCountEl.textContent = total;
                lastUpdateEl.textContent = new Date().toLocaleString('pt-BR');

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">Nenhum ticket em aprovação.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="col-id font-medium">#${t.ticket_id || t.id}</td>
                        <td class="col-title">${t.title || '-'}</td>
                        <td class="col-entity">${t.entity || '-'}</td>
                        <td class="col-technician">${t.requester || '-'}</td>
                        <td class="col-date">${t.date_created ? new Date(t.date_created).toLocaleDateString('pt-BR') : '-'}</td>
                        <td class="col-status"><span class="status-badge pending">Aguardando</span></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-red-600 py-8">Erro ao carregar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadAprovacao();
                setInterval(loadAprovacao, 3 * 60 * 1000);
            }, 100);
        });
    </script>
</body>
</html>
