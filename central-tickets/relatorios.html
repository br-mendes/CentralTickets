<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Central de Tickets</title>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="shared-header.js"></script>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Relatórios</h1>
            <div>
                <button onclick="exportExcel()" class="btn btn-primary">Exportar Excel</button>
            </div>
        </div>

        <div class="rounded-lg border p-4 mb-4 flex justify-between items-center bg-surface">
            <div>
                <p class="text-sm text-muted">Total de tickets</p>
                <p id="totalCount" class="text-3xl font-bold">0</p>
            </div>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-instance">Inst</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-category">Categoria</th>
                        <th class="col-status">Status</th>
                        <th class="col-group">Grupo</th>
                        <th class="col-technician">Técnico</th>
                        <th class="col-date">Abertura</th>
                        <th class="col-date">Fechamento</th>
                    </tr>
                </thead>
                <tbody id="relatoriosTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        let allTicketsData = [];

        async function loadRelatorios() {
            const tbody = document.getElementById('relatoriosTableBody');
            const totalEl = document.getElementById('totalCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8">Carregando...</td></tr>';

            try {
                allTicketsData = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await sbClient
                        .from('tickets_cache')
                        .select('*')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;
                    if (data?.length > 0) {
                        allTicketsData.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                const total = allTicketsData.length;
                totalEl.textContent = total;
                lastUpdateEl.textContent = new Date().toLocaleString('pt-BR');

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8">Nenhum ticket.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                allTicketsData.slice(0, 500).forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="col-id">#${t.ticket_id || t.id}</td>
                        <td class="col-instance"><span class="instance-badge ${t.instance?.toLowerCase()}">${t.instance}</span></td>
                        <td class="col-entity">${t.entity || '-'}</td>
                        <td class="col-category">${t.category || '-'}</td>
                        <td class="col-status"><span class="status-badge ${t.status_key}">${t.status_name}</span></td>
                        <td class="col-group">${(t.group_name || '').split('>').pop().trim() || '-'}</td>
                        <td class="col-technician">${t.technician || '-'}</td>
                        <td class="col-date">${t.date_created ? new Date(t.date_created).toLocaleDateString('pt-BR') : '-'}</td>
                        <td class="col-date">${t.closedate ? new Date(t.closedate).toLocaleDateString('pt-BR') : '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-red-600 py-8">Erro ao carregar.</td></tr>';
            }
        }

        function exportExcel() {
            if (!allTicketsData.length) return alert('Nenhum dado para exportar');
            const ws = XLSX.utils.json_to_sheet(allTicketsData.map(t => ({
                ID: t.ticket_id,
                Título: t.title,
                Entidade: t.entity,
                Status: t.status_name,
                Técnico: t.technician,
                Abertura: t.date_created,
                Fechamento: t.closedate
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Tickets');
            XLSX.writeFile(wb, `relatorio_tickets_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadRelatorios();
            }, 100);
        });
    </script>
</body>
</html>
