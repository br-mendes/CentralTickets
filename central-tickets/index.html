<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Tickets - Dashboard</title>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared-header.js"></script>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Dashboard Central de Tickets</h1>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="rounded-lg border p-4 bg-surface">
                <p class="text-sm text-muted">Total Tickets</p>
                <p id="totalCount" class="text-3xl font-bold">0</p>
            </div>
            <div class="rounded-lg border p-4 bg-surface">
                <p class="text-sm text-muted">Em Atendimento</p>
                <p id="processingCount" class="text-3xl font-bold text-green-600">0</p>
            </div>
            <div class="rounded-lg border p-4 bg-surface">
                <p class="text-sm text-muted">Pendentes</p>
                <p id="pendingCount" class="text-3xl font-bold text-orange-600">0</p>
            </div>
            <div class="rounded-lg border p-4 bg-surface">
                <p class="text-sm text-muted">SLA Excedido</p>
                <p id="slaLateCount" class="text-3xl font-bold text-red-600">0</p>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-instance">Inst</th>
                        <th class="col-title">Título</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-status">Status</th>
                        <th class="col-technician">Técnico</th>
                        <th class="col-date">Abertura</th>
                        <th class="col-sla">SLA</th>
                    </tr>
                </thead>
                <tbody id="dashboardTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        function getUnifiedStatus(status) {
            if (!status) return 'new';
            const s = status.toLowerCase();
            if (s.includes('atendimento') || s.includes('processing')) return 'processing';
            if (s.includes('pendente') || s.includes('pending')) return 'pending';
            if (s.includes('solucionado') || s.includes('solved')) return 'solved';
            if (s.includes('fechado') || s.includes('closed')) return 'closed';
            return 'new';
        }

        async function loadDashboard() {
            const tbody = document.getElementById('dashboardTableBody');
            const totalEl = document.getElementById('totalCount');
            const processingEl = document.getElementById('processingCount');
            const pendingEl = document.getElementById('pendingCount');
            const slaLateEl = document.getElementById('slaLateCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8">Carregando...</td></tr>';

            try {
                const allTickets = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await sbClient
                        .from('tickets_cache')
                        .select('*')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;
                    if (data?.length > 0) {
                        allTickets.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                const total = allTickets.length;
                const processing = allTickets.filter(t => t.status_key === 'processing').length;
                const pending = allTickets.filter(t => t.status_key === 'pending').length;
                const slaLate = allTickets.filter(t => t.is_sla_late).length;

                totalEl.textContent = total;
                processingEl.textContent = processing;
                pendingEl.textContent = pending;
                slaLateEl.textContent = slaLate;
                lastUpdateEl.textContent = `Atualizado: ${new Date().toLocaleTimeString('pt-BR')}`;

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8">Nenhum ticket.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                allTickets.slice(0, 100).forEach(t => {
                    const unifiedStatus = getUnifiedStatus(t.status_name);
                    const slaClass = t.is_sla_late ? 'sla-late' : 'sla-ok';
                    const slaText = t.is_sla_late ? 'Excedido' : 'OK';

                    const tr = document.createElement('tr');
                    tr.className = t.is_sla_late ? 'sla-late' : '';
                    tr.innerHTML = `
                        <td class="col-id font-medium">#${t.ticket_id || t.id}</td>
                        <td class="col-instance"><span class="instance-badge ${t.instance?.toLowerCase()}">${t.instance}</span></td>
                        <td class="col-title" title="${t.title}">${t.title || '-'}</td>
                        <td class="col-entity">${t.entity || '-'}</td>
                        <td class="col-status"><span class="status-badge ${unifiedStatus}">${t.status_name || 'Novo'}</span></td>
                        <td class="col-technician">${t.technician || '-'}</td>
                        <td class="col-date">${new Date(t.date_created).toLocaleDateString('pt-BR')}</td>
                        <td class="col-sla"><span class="sla-badge ${slaClass}">${slaText}</span></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-red-600 py-8">Erro ao carregar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadDashboard();
                setInterval(loadDashboard, 3 * 60 * 1000);
            }, 100);
        });
    </script>
</body>
</html>
