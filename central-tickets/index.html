<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Central de Tickets - Dashboard de Tickets GLPI">
    <title>Central de Tickets</title>
    <link rel="icon" href="favicon-peta.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --background: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            --status-new: #3b82f6;
            --status-processing: #f59e0b;
            --status-pending: #8b5cf6;
            --status-solved: #10b981;
            --status-closed: #6b7280;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --background: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 .page-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header h1 .title-main {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .header h1 .subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-logo-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-fallback svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .theme-toggle {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .last-update {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .main {
            flex: 1;
            padding: 24px;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            color: #ef4444;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--text-secondary);
            max-width: 400px;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        .filtered-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        @media (max-width: 1600px) {
            .kanban-board {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1100px) {
            .kanban-board {
                grid-template-columns: repeat(2, 1fr);
            }
            .filtered-board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            .filtered-board {
                grid-template-columns: 1fr;
            }
            .summary-dashboard {
                grid-template-columns: 1fr 1fr;
            }
            .nav-links {
                flex-wrap: wrap;
            }
            .nav-link {
                flex: 1;
                justify-content: center;
                min-width: 120px;
            }
        }

        @media (max-width: 600px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-actions {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
            }
            
            .main {
                padding: 16px;
            }

            .summary-dashboard {
                grid-template-columns: 1fr;
                padding: 0;
            }

            .instance-cards {
                grid-template-columns: 1fr;
            }

            .quick-actions {
                flex-direction: column;
            }

            .quick-action {
                width: 100%;
            }

            .header-nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-link {
                flex: 1;
                justify-content: center;
                min-width: 100px;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 500px) {
            .header-nav {
                display: none;
            }
        }

        .instance-dropdown {
            position: relative;
        }

        .instance-dropdown-header {
            padding: 8px 12px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            user-select: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .instance-dropdown-header:hover {
            border-color: var(--primary);
            background: var(--surface);
        }

        .instance-dropdown-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .instance-dropdown.open .instance-dropdown-header svg {
            transform: rotate(180deg);
        }

        .instance-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .instance-dropdown.open .instance-dropdown-menu {
            display: block;
        }

        .instance-dropdown-option {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .instance-dropdown-option:hover {
            background: var(--background);
        }

        .instance-dropdown-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .instance-dropdown-option.peta {
            color: #2563eb;
        }

        .instance-dropdown-option.gmx {
            color: #7c3aed;
        }

        .kanban-column {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 180px);
            overflow: hidden;
        }

        .column-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.new { background: var(--status-new); }
        .status-dot.processing { background: var(--status-processing); }
        .status-dot.pending { background: var(--status-pending); }
        .status-dot.solved { background: var(--status-solved); }
        .status-dot.closed { background: var(--status-closed); }

        .column-count {
            background: var(--background);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .column-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .column-content::-webkit-scrollbar {
            width: 6px;
        }

        .column-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .column-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .load-more-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: var(--background);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            background: var(--surface);
            border-color: var(--primary);
            color: var(--primary);
        }

        .ticket-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ticket-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .ticket-card.new { border-left: 3px solid var(--status-new); }
        .ticket-card.processing { border-left: 3px solid var(--status-processing); }
        .ticket-card.pending { border-left: 3px solid var(--status-pending); }
        .ticket-card.solved { border-left: 3px solid var(--status-solved); }
        .ticket-card.closed { border-left: 3px solid var(--status-closed); }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
        }

        .ticket-id {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
        }

        .ticket-entity {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--background);
            padding: 2px 8px;
            border-radius: 4px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-category {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticket-category svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .ticket-dates {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .ticket-date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-date-label {
            color: var(--text-muted);
        }

        .ticket-date-value {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .pending-time {
            background: rgba(139, 92, 246, 0.1);
            color: var(--status-pending);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .pending-time svg {
            width: 14px;
            height: 14px;
        }

        .empty-column {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background);
        }

        .btn-secondary.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .view-indicator {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .view-indicator.processing {
            background: var(--status-processing);
        }

        .view-indicator.pending {
            background: var(--status-pending);
        }

        .ticket-card.urgent {
            border-color: #f59e0b;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent);
        }

        .ticket-card.urgent.processing {
            border-left-color: var(--status-processing);
        }

        .ticket-card.urgent.pending {
            border-left-color: var(--status-pending);
        }

        .instance-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .instance-badge.peta {
            background: rgba(37, 99, 235, 0.15);
            color: #2563eb;
        }

        .instance-badge.gmx {
            background: rgba(234, 88, 12, 0.15);
            color: #ea580c;
        }

        .ticket-entity-mini {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-card .ticket-id a {
            color: var(--primary);
            text-decoration: none;
        }

        .ticket-card .ticket-id a:hover {
            text-decoration: underline;
        }

        .summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.2s;
        }

        .summary-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .summary-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .summary-card-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-card-title svg {
            width: 18px;
            height: 18px;
        }

        .summary-card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .summary-card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .summary-subitem {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
        }

        .summary-subitem-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .summary-subitem-label {
            color: var(--text-secondary);
        }

        .summary-subitem-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .summary-section {
            margin-bottom: 8px;
        }

        .summary-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .summary-bar-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-bar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
        }

        .summary-bar-label {
            min-width: 100px;
            color: var(--text-secondary);
        }

        .summary-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .summary-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .summary-bar-value {
            min-width: 30px;
            text-align: right;
            font-weight: 600;
            color: var(--text-primary);
        }

        .team-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .team-item:last-child {
            border-bottom: none;
        }

        .team-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .team-name {
            flex: 1;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .team-count {
            font-weight: 600;
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nav-link.active:hover {
            background: var(--primary-dark);
            color: white;
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        .header-nav {
            display: flex;
            gap: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cache-actions {
            display: flex;
            gap: 4px;
        }

        .cache-btn {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .cache-btn:hover {
            background: var(--border);
            color: var(--primary);
        }

        .cache-btn svg {
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
        }

        .cache-btn:hover svg {
            color: var(--primary);
        }

        .dashboard-section {
            margin-bottom: 32px;
        }

        .dashboard-section-title {
            font-size: 1.125rem;

        .period-card-meta {

        .instance-row {

            border-radius: var(--radius-lg);

            background: linear-gradient(135deg, rgba(234, 88, 12, 0.1), rgba(234, 88, 12, 0.05));

        .instance-summary-title {

            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;

        .instance-summary-title svg {
            width: 20px;

        .instance-summary-title.peta svg {
            color: #2563eb;
        }

        .instance-summary-title.gmx svg {
            color: #ea580c;
        }

        }

            background: rgba(37, 99, 235, 0.15);
            color: #2563eb;
        }

        .instance-summary-badge.gmx {
            background: rgba(234, 88, 12, 0.15);
            color: #ea580c;
        }

        .instance-summary-body {
            padding: 20px;

            display: grid;

            padding: 12px;
            text-align: center;

            background: var(--background);

            font-size: 0.75rem;
            color: var(--text-secondary);

            font-size: 1rem;
            font-weight: 600;

        .metric-value.warning {

                grid-template-columns: repeat(2, 1fr);
            }

        .sla-alert-cards {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;

            flex: 1;

            text-align: center;

            border-color: #ef4444;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.05), transparent);

            font-size: 2.5rem;
            font-weight: 700;
            color: #ef4444;

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-meta {
            font-size: 0.75rem;
            margin-top: 4px;

        .stat-card-full .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

            font-size: 0.75rem;
            color: var(--text-secondary);

            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: var(--text-primary);
            color: var(--background);
            text-align: left;
            border-radius: var(--radius-sm);
            padding: 8px 12px;

            z-index: 1000;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.75rem;
            max-width: 300px;
            white-space: normal;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--text-primary) transparent transparent transparent;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

            overflow: hidden;
            display: flex;
            position: relative;
        }

            height: 100%;

            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            min-width: 40px;

        .bar-value {

        .bar-total {

            font-size: 0.875rem;

        .bar-legend {

        }

        .expand-btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .expand-btn.expanded svg {

        // ========== SUPABASE SYNC ==========
        async function syncTicketsToSupabase(glpiTickets, instanceName) {
            try {
                console.log(`[Supabase] Sincronizando ${glpiTickets.length} tickets de ${instanceName}...`);
                
                const ticketsToUpsert = glpiTickets.map(ticket => ({
                    glpi_id: ticket.id,
                    instance: instanceName.toUpperCase(),
                    title: ticket.title || ticket.name || '',
                    content: ticket.content || ticket.description || '',
                    entity: ticket.entity || '',
                    category: ticket.category || '',
                    technician: ticket.technician || ticket.user || '',
                    status: ticket.status || 1,
                    date_opening: ticket.date_creation || ticket.date || null,
                    date_takeaccount: ticket.date_takeaccount || null,
                    date_solve: ticket.solvedate || null,
                    date_close: ticket.closedate || null,
                    internal_time_to_own: ticket.time_to_own || null,
                    internal_time_to_resolve: ticket.time_to_resolve || null,
                    sla_percentage_first: ticket.sla_agreement_tto_percent_done || null,
                    sla_percentage_resolve: ticket.sla_agreement_ttr_percent_done || null,
                    is_overdue_first: ticket.is_late === '1' || ticket.time_to_own <= 0,
                    is_overdue_resolve: ticket.is_late === '1' || ticket.time_to_resolve <= 0,
                    updated_at: new Date().toISOString()
                }));

                const { data, error } = await sbClient
                    .from('tickets')
                    .upsert(ticketsToUpsert, { 
                        onConflict: 'glpi_id,instance',
                        ignoreDuplicates: false 
                    });

                if (error) {
                    console.error('[Supabase] Erro ao sincronizar:', error);
                    return false;
                }

                console.log(`[Supabase] ${glpiTickets.length} tickets sincronizados com sucesso!`);
                return true;
            } catch (err) {
                console.error('[Supabase] Erro na sincronização:', err);
                return false;
            }
        }

        async function fetchTicketsFromSupabase(instanceFilter = null) {
            try {
                let query = supabase
                    .from('tickets')
                    .select('*')
                    .order('date_opening', { ascending: false });

                if (instanceFilter && instanceFilter.length > 0) {
                    query = query.in('instance', instanceFilter.map(i => i.toUpperCase()));
                }

                const { data, error } = await query;

                if (error) {
                    console.error('[Supabase] Erro ao buscar tickets:', error);
                    return null;
                }

                return data || [];
            } catch (err) {
                console.error('[Supabase] Erro ao buscar tickets:', err);
                return null;
            }
        }

        async function getLastSyncTime() {
            try {
                const { data, error } = await sbClient
                    .from('tickets')
                    .select('updated_at')
                    .order('updated_at', { ascending: false })
                    .limit(1);
                
                if (error) return null;
                return data && data.length > 0 ? data[0].updated_at : null;
            } catch {
                return null;
            }
        }

        // ========== FIM SUPABASE SYNC ==========

        // Mapeamento de status do GLPI
        const TICKET_STATUS = {
            1: { name: 'Novo', key: 'new', color: '#3b82f6' },
            2: { name: 'Em atendimento', key: 'processing', color: '#f59e0b' },
            3: { name: 'Em atendimento', key: 'processing', color: '#f59e0b' },
            4: { name: 'Pendente', key: 'pending', color: '#8b5cf6' },
            5: { name: 'Solucionado', key: 'solved', color: '#10b981' },
            6: { name: 'Fechado', key: 'closed', color: '#6b7280' },
        };

        const STATUS_ORDER = ['processing', 'pending', 'solved', 'closed'];

        const STATUS_LABELS = {

            'processing': 'Em atendimento',
            'pending': 'Pendente',
            'solved': 'Solucionado',

        };

                document.getElementById('moonIcon').style.display = 'block';

            if (savedTheme === 'dark') {

        // Função para iniciar sessão na API - tenta diferentes endpoints
        async function initSession() {
            let lastError = null;
            
            for (const baseUrl of API_ENDPOINTS) {
                try {
                    console.log(`Tentando autenticar em: ${baseUrl}`);
                    
                    const response = await fetch(`${baseUrl}/initSession/`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `user_token ${API_CONFIG.USER_TOKEN}`,
                            'App-Token': API_CONFIG.APP_TOKEN,
                        },
                    });

                    if (response.ok) {
                        const data = await response.json();
                        sessionToken = data.session_token;
                        API_CONFIG.BASE_URL = baseUrl; // Usar o endpoint que funcionou
                        console.log('Autenticação bem-sucedida!');
                        return sessionToken;
                    }
                    
                    const errorText = await response.text();
                    console.log(`Endpoint ${baseUrl} retornou ${response.status}: ${errorText}`);
                    lastError = new Error(`Erro ${response.status} em ${baseUrl}`);
                    
                } catch (error) {
                    console.log(`Endpoint ${baseUrl} falhou:`, error.message);
                    lastError = error;
                }
            }
            
            // Se nenhum endpoint funcionou, lançar erro detalhado
            console.error('Falha na autenticação em todos os endpoints:', lastError);
            throw lastError || new Error('Falha na autenticação');
        }

        // Função para encerrar sessão
        async function killSession() {
            for (const instanceName of Object.keys(INSTANCES)) {
                if (sessionTokens[instanceName]) {
                    try {
                        await fetch(`${INSTANCES[instanceName].BASE_URL}/killSession/`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': INSTANCES[instanceName].APP_TOKEN,
                            },
                        });
                    } catch (error) {
                        console.error(`Erro ao encerrar sessão ${instanceName}:`, error);
                    }
                }
            }
            sessionTokens = {};
        }

        // Função para iniciar sessão em uma instância
        async function initSession(instanceName) {
            const instance = INSTANCES[instanceName];
            console.log(`[GLPI] Iniciando sessão em ${instanceName}...`);
            console.log(`[GLPI] URL: ${instance.BASE_URL}`);
            console.log(`[GLPI] User Token: ${instance.USER_TOKEN ? 'definido' : 'NÃO DEFINIDO'}`);
            console.log(`[GLPI] App Token: ${instance.APP_TOKEN ? 'definido' : 'NÃO DEFINIDO'}`);
            
            try {
                const response = await fetch(`${instance.BASE_URL}/initSession/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `user_token ${instance.USER_TOKEN}`,
                        'App-Token': instance.APP_TOKEN,
                    },
                });

                console.log(`[GLPI] Resposta: ${response.status} ${response.statusText}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error(`[GLPI] Erro detalhado:`, errorText);
                    throw new Error(`Erro ao iniciar sessão em ${instanceName}: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                console.log(`[GLPI] Sessão iniciada com sucesso para ${instanceName}`);
                sessionTokens[instanceName] = data.session_token;
                return data.session_token;
            } catch (error) {
                console.error(`[GLPI] Erro na autenticação ${instanceName}:`, error);
                throw error;
            }
        }

        // Função para buscar tickets de uma instância
        async function getTicketsFromInstance(instanceName, retryCount = 0) {
            const instance = INSTANCES[instanceName];
            
            if (!sessionTokens[instanceName]) {
                await initSession(instanceName);
            }

            try {
                const allTickets = [];
                let page = 0;
                const pageSize = 100;
                let hasMore = true;
                let consecutiveErrors = 0;

                while (hasMore) {
                    const start = page * pageSize;
                    const end = start + pageSize - 1;

                    const searchParams = new URLSearchParams({
                        'range': `${start}-${end}`,
                        'expand_dropdowns': 'true',
                        'get_hateoas': 'false',
                    });

                    const response = await fetch(
                        `${instance.BASE_URL}/search/Ticket/?${searchParams.toString()}`,
                        {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': instance.APP_TOKEN,
                            },
                        }
                    );

                    if (!response.ok) {
                        consecutiveErrors++;
                        console.error(`[GLPI] Erro na requisição: ${response.status} ${response.statusText}`);
                        if (response.status === 401 && retryCount < 2) {
                            console.log(`🔄 Sessão expirada para ${instanceName}, reautenticando...`);
                            sessionTokens[instanceName] = null;
                            await initSession(instanceName);
                            return getTicketsFromInstance(instanceName, retryCount + 1);
                        }
                        throw new Error(`Erro ao buscar tickets de ${instanceName}: ${response.status}`);
                    }

                    consecutiveErrors = 0;
                    const data = await response.json();
                    
                    if (data.data) {
                        const ticketsArray = Array.isArray(data.data) ? data.data : Object.values(data.data);
                        
                        if (ticketsArray.length === 0) {
                            hasMore = false;
                        } else {
                            allTickets.push(...ticketsArray);
                            page++;
                            
                            if (ticketsArray.length < pageSize || page >= 50) {
                                hasMore = false;
                            }
                        }
                    } else {
                        hasMore = false;
                    }
                }

                return processTickets(allTickets, instanceName);
            } catch (error) {
                console.error(`Erro ao buscar tickets de ${instanceName}:`, error);
                throw error;
            }
        }

        // Função para buscar tickets de todas as instâncias
        async function getAllTickets() {
            const allTickets = [];
            const errors = [];
            
            for (const instanceName of selectedInstances) {
                try {
                    await initSession(instanceName);
                    const instanceTickets = await getTicketsFromInstance(instanceName);
                    allTickets.push(...instanceTickets);
                    console.log(`✅ ${instanceName}: ${instanceTickets.length} tickets carregados`);
                } catch (error) {
                    console.error(`❌ Falha ao carregar tickets de ${instanceName}:`, error);
                    errors.push({ instance: instanceName, error: error.message });
                }
            }
            
            if (allTickets.length === 0 && errors.length > 0) {
                throw new Error(`Falha ao carregar tickets: ${errors.map(e => e.instance).join(', ')}`);
            }
            
            console.log(`📊 Total de tickets carregados: ${allTickets.length}`);
            return allTickets;
        }

        // Função para processar tickets da API
        function getRootCategory(category) {
            if (!category) return 'Não categorizado';
            const parts = category.split(' > ');
            return parts[0].trim();
        }

        function getLastCategory(category) {
            if (!category) return 'Não categorizado';
            const parts = category.split(' > ');
            return parts[parts.length - 1].trim();
        }

        function isSlaExceeded(dueDateStr) {
            if (!dueDateStr) return false;
            const dueDate = new Date(dueDateStr);
            const now = new Date();
            return dueDate < now;
        }

        function processTickets(rawTickets, instanceName) {
            return rawTickets.map(ticket => {
                const statusId = parseInt(ticket[12]) || 1;
                const statusInfo = TICKET_STATUS[statusId] || TICKET_STATUS[1];
                
                let category = ticket[7] || 'Não categorizado';

                const dueDate = ticket[151] || ticket.due_date;
                const isSlaLate = isSlaExceeded(dueDate);

                return {
                    id: ticket[2] || ticket.id,
                    title: ticket[1] || 'Sem título',
                    entity: ticket[80] || 'Entidade não definida',
                    category: category,
                    rootCategory: getRootCategory(category),
                    group: ticket[8] || 'Não atribuído',
                    statusId: statusId,
                    status: statusInfo.key,
                    statusName: statusInfo.name,
                    statusColor: statusInfo.color,
                    dateCreated: ticket[15] || ticket.date_creation,
                    dueDate: dueDate,
                    isSlaLate: isSlaLate,
                    timePending: statusInfo.key === 'pending' ? calculatePendingTime(ticket) : null,
                    instance: instanceName,
                    instanceUrl: INSTANCES[instanceName].TICKET_URL,
                };
            });
        }

        // Função para calcular tempo em pendência
        function calculatePendingTime(ticket) {
            const lastUpdate = ticket[91] || ticket.date_creation;
            if (!lastUpdate) return null;

            const updateDate = new Date(lastUpdate);
            const now = new Date();
            const diffMs = now - updateDate;

            return formatDuration(diffMs);
        }

        // Função para formatar duração
        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) {
                const remainingHours = hours % 24;
                if (remainingHours > 0) {
                    return `há ${days} dia${days > 1 ? 's' : ''} e ${remainingHours} hora${remainingHours > 1 ? 's' : ''}`;
                }
                return `há ${days} dia${days > 1 ? 's' : ''}`;
            }
            
            if (hours > 0) {
                return `há ${hours} hora${hours > 1 ? 's' : ''}`;
            }
            
            if (minutes > 0) {
                return `há ${minutes} minuto${minutes > 1 ? 's' : ''}`;
            }
            
            return 'há poucos segundos';
        }

        // Função para formatar data
        function formatShortDate(dateString) {
            if (!dateString) return 'N/A';
            
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'N/A';
                
                return date.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                });
            } catch {
                return 'N/A';
            }
        }

        // Função para obter hora formatada
        function getCurrentTimeFormatted() {
            return new Date().toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',

        }

${JSON.stringify(error, null, 2)}

                `;
            }
            
            mainContent.innerHTML = `

        function getInstanceStats(tickets, instanceName) {
            const instanceTickets = tickets.filter(t => t.instance === instanceName);
            return {
                total: instanceTickets.length,
                new: instanceTickets.filter(t => t.status === 'new').length,
                processing: instanceTickets.filter(t => t.status === 'processing').length,
                pending: instanceTickets.filter(t => t.status === 'pending').length,
                solved: instanceTickets.filter(t => t.status === 'solved').length,
                closed: instanceTickets.filter(t => t.status === 'closed').length,
                tickets: instanceTickets
            };
        }

        function getAvgPendingTime(tickets) {
            const pending = tickets.filter(t => t.status === 'pending');
            if (pending.length === 0) return { time: 'N/A', class: '', count: 0 };
            
            let totalMs = 0;
            let count = 0;
            pending.forEach(t => {
                if (t.dateCreated) {
                    totalMs += (new Date() - new Date(t.dateCreated));
                    count++;
                }
            });
            
            if (count === 0) return { time: 'N/A', class: '', count: pending.length };
            
            const avgMs = totalMs / count;
            const days = Math.floor(avgMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((avgMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            let timeStr, timeClass;
            if (days > 2) {
                timeStr = days > 0 ? `${days}d ${hours}h` : `${hours}h`;
                timeClass = 'danger';
            } else if (days > 0 || hours > 24) {
                timeStr = days > 0 ? `${days}d ${hours}h` : `${hours}h`;
                timeClass = 'warning';
            } else {
                timeStr = `${hours}h`;
                timeClass = '';
            }
            
            return { time: timeStr, class: timeClass, count: pending.length };
        }

        function getTicketsByPeriod(tickets, days) {
            const now = new Date();
            const startDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
            return tickets.filter(t => {
                if (!t.dateCreated) return false;
                const created = new Date(t.dateCreated);
                return created >= startDate;
            });
        }

        function getTicketsClosedInPeriod(tickets, days) {
            const now = new Date();
            const startDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
            return tickets.filter(t => {
                if (t.status !== 'closed' && t.status !== 'solved') return false;
                if (!t.dateCreated) return false;
                const created = new Date(t.dateCreated);
                return created >= startDate;
            });
        }

        function renderPeriodContent(tickets, days) {
            const periodTickets = getTicketsByPeriod(tickets, days);
            const closedTickets = getTicketsClosedInPeriod(tickets, days);

            const petaPeriod = getTicketsByPeriod(periodTickets.filter(t => t.instance === 'Peta'), days);
            const gmxPeriod = getTicketsByPeriod(periodTickets.filter(t => t.instance === 'GMX'), days);
            const petaClosed = getTicketsClosedInPeriod(closedTickets.filter(t => t.instance === 'Peta'), days);
            const gmxClosed = getTicketsClosedInPeriod(closedTickets.filter(t => t.instance === 'GMX'), days);

            const periodLabel = days === 30 ? 'Este Mês' : `Últimos ${days} dias`;

            return `
                <div class="period-summary">
                    <div class="period-card">
                        <div class="period-card-header">
                            <span class="period-card-title">Abertos</span>
                        </div>
                        <div class="period-card-value">${periodTickets.length}</div>
                        <div class="period-card-meta">
                            <span style="color: #2563eb;">Peta: ${petaPeriod.length}</span> · 
                            <span style="color: #ea580c;">GMX: ${gmxPeriod.length}</span>
                        </div>
                    </div>
                    <div class="period-card">
                        <div class="period-card-header">
                            <span class="period-card-title">Fechados</span>
                        </div>
                        <div class="period-card-value">${closedTickets.length}</div>
                        <div class="period-card-meta">
                            <span style="color: #2563eb;">Peta: ${petaClosed.length}</span> · 
                            <span style="color: #ea580c;">GMX: ${gmxClosed.length}</span>
                        </div>
                    </div>
                    <div class="period-card">
                        <div class="period-card-header">
                            <span class="period-card-title">Em Aberto</span>
                        </div>
                        <div class="period-card-value">${periodTickets.length - closedTickets.length}</div>
                        <div class="period-card-meta">
                            Saldo do período
                        </div>
                    </div>
                    <div class="period-card">
                        <div class="period-card-header">
                            <span class="period-card-title">Taxa Fechamento</span>
                        </div>
                        <div class="period-card-value">${periodTickets.length > 0 ? Math.round(closedTickets.length / periodTickets.length * 100) : 0}%</div>
                        <div class="period-card-meta">
                            Fechados / Abertos
                        </div>
                    </div>
                </div>
            `;
        }

        function updatePeriodFilter(btn, tickets) {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const days = parseInt(btn.dataset.period);
            document.getElementById('periodContent').innerHTML = renderPeriodContent(tickets, days);
        }

        function toggleSolutionChart(btn) {
            const extraItems = document.getElementById('solutionExtraItems');
            const isExpanded = btn.classList.toggle('expanded');
            extraItems.style.display = isExpanded ? 'block' : 'none';
            btn.querySelector('span').textContent = isExpanded ? 'Ver menos' : `Ver todas as ${Object.keys(window.ticketsBySolution || {}).length} categorias`;
        }

        function toggleGroupChart(btn) {
            const extraItems = document.getElementById('groupExtraItems');
            const isExpanded = btn.classList.toggle('expanded');
            extraItems.style.display = isExpanded ? 'block' : 'none';
            btn.querySelector('span').textContent = isExpanded ? 'Ver menos' : `Ver todos os ${Object.keys(window.ticketsByGroup || {}).length} grupos`;
        }

        function renderKanban(tickets) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = renderFullDashboard(tickets);
        }

        // Função para renderizar card de ticket
        function renderTicketCard(ticket, isFiltered = false) {
            let pendingHTML = '';
            if (ticket.status === 'pending' && ticket.timePending) {
                pendingHTML = `
                    <div class="pending-time">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        ${ticket.timePending}
                    </div>
                `;
            }
            
            const urgentClass = isFiltered ? 'urgent' : '';
            const instanceClass = ticket.instance ? ticket.instance.toLowerCase() : '';
            const cardClass = `ticket-card ${ticket.status} ${urgentClass}`.trim();

            return `
                <div class="${cardClass}">
                    <div class="ticket-header">
                        <span class="ticket-id">
                            <a href="${ticket.instanceUrl}${ticket.id}" target="_blank" title="${ticket.title}">
                                #${ticket.id}
                            </a>
                        </span>
                        <span class="instance-badge ${instanceClass}">${ticket.instance}</span>
                    </div>
                    
                    <div class="ticket-entity-mini" title="${ticket.entity}">${ticket.entity}</div>
                    
                    <div class="ticket-category" title="${ticket.title}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        ${ticket.category}
                    </div>
                    
                    <div class="ticket-dates">
                        <div class="ticket-date-row">
                            <span class="ticket-date-label">Abertura:</span>
                            <span class="ticket-date-value">${formatShortDate(ticket.dateCreated)}</span>
                        </div>
                        <div class="ticket-date-row">
                            <span class="ticket-date-label">Previsto:</span>
                            <span class="ticket-date-value">${formatShortDate(ticket.dueDate)}</span>
                        </div>
                    </div>
                    
                    ${pendingHTML}
                </div>
            `;
        }

        // ========== SISTEMA DE CACHE ==========
        const CACHE_KEY = 'central_tickets_cache';
        const CACHE_TIMESTAMP_KEY = 'central_tickets_cache_timestamp';

        function saveCache() {
            try {
                const cacheData = {
                    tickets: tickets,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                localStorage.setItem(CACHE_TIMESTAMP_KEY, new Date().toISOString());
                console.log('💾 Cache salvo com sucesso');
                return true;
            } catch (error) {
                console.error('❌ Erro ao salvar cache:', error);
                return false;
            }
        }

        function loadCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const cacheData = JSON.parse(cached);
                    console.log('📂 Cache carregado de:', new Date(cacheData.timestamp).toLocaleString('pt-BR'));
                    return cacheData.tickets;
                }
            } catch (error) {
                console.error('❌ Erro ao carregar cache:', error);
            }
            return null;
        }

        function getCacheTimestamp() {
            return localStorage.getItem(CACHE_TIMESTAMP_KEY);
        }

        function clearCache() {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_TIMESTAMP_KEY);
            console.log('🗑️ Cache limpo');
        }

        function exportToJSON() {
            if (tickets.length === 0) {
                alert('Nenhum ticket para exportar. Carregue os dados primeiro.');
                return;
            }

            const exportData = {
                exportedAt: new Date().toISOString(),
                totalTickets: tickets.length,
                instances: {
                    peta: tickets.filter(t => t.instance === 'Peta').length,
                    gmx: tickets.filter(t => t.instance === 'GMX').length
                },
                tickets: tickets
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `tickets_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log('📤 Exportação concluída');
        }

        function importFromJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        if (importedData.tickets && Array.isArray(importedData.tickets)) {
                            if (confirm(`Importar ${importedData.tickets.length} tickets de ${importedData.exportedAt ? new Date(importedData.exportedAt).toLocaleDateString('pt-BR') : 'data desconhecida'}?\n\nIsso substituirá os dados atuais.`)) {
                                tickets = importedData.tickets;
                                saveCache();
                                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                                renderKanban(tickets);
                                alert(`✅ ${tickets.length} tickets importados com sucesso!`);
                            }
                        } else {
                            alert('❌ Arquivo JSON inválido. Verifique o formato.');
                        }
                    } catch (error) {
                        alert('❌ Erro ao ler arquivo: ' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        // Função para atualizar tickets
        async function refreshTickets() {
            if (isLoading) return;
            
            isLoading = true;
            const refreshBtn = document.getElementById('refreshBtn');
            const syncBtn = document.getElementById('syncBtn');
            if (refreshBtn) refreshBtn.disabled = true;
            if (syncBtn) syncBtn.disabled = true;
            showLoading();
            
            console.log('🔄 Iniciando atualização de tickets...');

            try {
                tickets = await getAllTickets();
                
                // Sincronizar com Supabase após obter tickets do GLPI
                for (const instanceName of selectedInstances) {
                    const instanceTickets = tickets.filter(t => t.instance === instanceName);
                    if (instanceTickets.length > 0) {
                        await syncTicketsToSupabase(instanceTickets, instanceName);
                    }
                }
                
                saveCache();
                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                renderKanban(tickets);
                
                // Atualizar última atualização
                const lastUpdateEl = document.getElementById('lastUpdate');
                if (lastUpdateEl) {
                    lastUpdateEl.textContent = `Última atualização: ${getCurrentTimeFormatted()}`;
                }
                
                console.log('✅ Atualização concluída com sucesso');
            } catch (error) {
                console.error('❌ Erro na atualização:', error);
                showError(
                    'Erro ao carregar tickets',
                    'Verifique sua conexão, credenciais ou tente novamente mais tarde.',
                    {
                        message: error.message,
                        baseUrl: API_CONFIG.BASE_URL,
                        stack: error.stack
                    }
                );
            } finally {
                isLoading = false;
                if (refreshBtn) refreshBtn.disabled = false;
                if (syncBtn) syncBtn.disabled = false;
            }
        }

        async function syncToSupabase() {
            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) {
                syncBtn.disabled = true;
                syncBtn.style.opacity = '0.5';
            }
            
            try {
                console.log('🔄 Sincronizando com Supabase...');
                
                for (const instanceName of selectedInstances) {
                    const instanceTickets = tickets.filter(t => t.instance === instanceName);
                    if (instanceTickets.length > 0) {
                        await syncTicketsToSupabase(instanceTickets, instanceName);
                    }
                }
                
                alert('Sincronização com Supabase concluída!');
            } catch (error) {
                console.error('❌ Erro na sincronização:', error);
                alert('Erro ao sincronizar com Supabase');
            } finally {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.style.opacity = '1';
                }
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initInstanceDropdown();
            
            // Tentar carregar do cache primeiro para carregamento rápido
            const cachedTickets = loadCache();
            if (cachedTickets && cachedTickets.length > 0) {
                tickets = cachedTickets;
                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                renderKanban(tickets);
                
                const lastUpdateEl = document.getElementById('lastUpdate');
                if (lastUpdateEl) {
                    const cacheTime = getCacheTimestamp();
                    lastUpdateEl.textContent = `Cache: ${cacheTime ? new Date(cacheTime).toLocaleString('pt-BR') : 'desconhecido'}`;
                }
                
                // Atualizar em background
                console.log('📂 Dados carregados do cache. Atualizando em background...');
                refreshTickets();
            } else {
                refreshTickets();
            }

            // Configurar atualização automática (recarrega a página)
            refreshTimer = setInterval(() => {
                console.log('🔄 Recarregando página automaticamente...');
                location.reload();
            }, REFRESH_INTERVAL);
        });

        // Cleanup ao sair da página
        window.addEventListener('beforeunload', () => {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
            killSession();
        });
    </script>
</body>
</html>
