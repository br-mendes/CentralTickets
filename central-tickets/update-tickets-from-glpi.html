<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Tickets do GLPI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }
        .btn-primary {
            background: #4ade80;
            color: #1a1a2e;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: #22c55e;
        }
        .btn-primary:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #3b82f6;
            color: white;
        }
        .btn-secondary:hover {
            background: #2563eb;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.loading {
            display: block;
            background: #1e3a5f;
            border: 1px solid #3b82f6;
        }
        .status.success {
            display: block;
            background: #1a3d2e;
            border: 1px solid #4ade80;
        }
        .status.error {
            display: block;
            background: #3d1a1a;
            border: 1px solid #ef4444;
        }
        .log {
            margin-top: 15px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
        }
        .log.visible {
            display: block;
        }
        .info {
            background: #2a2a4a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .info p {
            margin: 5px 0;
            color: #aaa;
        }
        .info strong {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Atualizar Tickets do GLPI</h1>
        
        <div class="info">
            <p><strong>Objetivo:</strong> Buscar tickets ativos no Supabase e atualizar campos via API do GLPI.</p>
            <p><strong>Campos atualizados:</strong> Entidade, Categoria, Status, Grupo, Técnico, Data de atualização.</p>
            <p><strong>Limite por execução:</strong> 100 tickets por instância.</p>
        </div>
        
        <button class="btn btn-primary" onclick="runUpdate()">🚀 Atualizar Todos os Tickets</button>
        <button class="btn btn-secondary" onclick="runUpdate('PETA')">📘 Apenas PETA</button>
        <button class="btn btn-secondary" onclick="runUpdate('GMX')">📙 Apenas GMX</button>
        
        <div id="status" class="status"></div>
        <div id="log" class="log"></div>
        
        <div style="margin-top: 20px;">
            <button class="btn btn-secondary" onclick="window.location.href='./index.html'">🏠 Voltar ao Dashboard</button>
        </div>
    </div>

    <script>
        const SUPABASE_FUNCTION_URL = 'https://zyigzxkwnltudojumhpq.supabase.co/functions/v1/update-tickets-from-glpi';
        
        async function runUpdate(instance = null) {
            const statusEl = document.getElementById('status');
            const logEl = document.getElementById('log');
            
            statusEl.className = 'status loading';
            statusEl.textContent = '⏳ Atualizando tickets...';
            logEl.textContent = '';
            logEl.classList.add('visible');
            
            const url = instance ? `${SUPABASE_FUNCTION_URL}?instance=${instance}` : SUPABASE_FUNCTION_URL;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusEl.className = 'status success';
                    statusEl.textContent = `✅ Atualização concluída!\n\n` +
                        `Total processados: ${result.total_processed}\n` +
                        `Total atualizados: ${result.total_updated}\n` +
                        `Total falhas: ${result.total_failed}\n` +
                        `Tempo: ${result.duration_ms}ms`;
                    
                    logEl.textContent = JSON.stringify(result.results, null, 2);
                } else {
                    statusEl.className = 'status error';
                    statusEl.textContent = `❌ Erro: ${result.error}`;
                    logEl.textContent = result.error;
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = `❌ Erro na requisição: ${error.message}`;
            }
        }
    </script>
</body>
</html>
