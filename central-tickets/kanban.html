<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban - Central de Tickets</title>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared-header.js"></script>
    <style>
        .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding: 16px 0; }
        .kanban-column { min-width: 300px; flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .kanban-column h3 { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .kanban-card { background: var(--background); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .kanban-card:hover { border-color: var(--primary); }
    </style>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Kanban</h1>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="kanban-board" id="kanbanBoard"></div>
    </main>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        const COLUMNS = [
            { key: 'new', label: 'Novo', color: '#3b82f6' },
            { key: 'processing', label: 'Em Atendimento', color: '#22c55e' },
            { key: 'pending', label: 'Pendente', color: '#f97316' },
            { key: 'solved', label: 'Solucionado', color: '#6b7280' },
            { key: 'closed', label: 'Fechado', color: '#1f2937' }
        ];

        async function loadKanban() {
            const board = document.getElementById('kanbanBoard');
            const lastUpdateEl = document.getElementById('lastUpdate');
            board.innerHTML = '<div class="text-center py-8">Carregando...</div>';

            try {
                const { data, error } = await sbClient
                    .from('tickets_cache')
                    .select('*')
                    .order('date_mod', { ascending: false })
                    .limit(500);

                if (error) throw error;

                lastUpdateEl.textContent = new Date().toLocaleString('pt-BR');

                board.innerHTML = '';
                COLUMNS.forEach(col => {
                    const tickets = data.filter(t => t.status_key === col.key);
                    const colDiv = document.createElement('div');
                    colDiv.className = 'kanban-column';
                    colDiv.innerHTML = `
                        <h3 style="color: ${col.color}">${col.label} (${tickets.length})</h3>
                        ${tickets.slice(0, 20).map(t => `
                            <div class="kanban-card">
                                <div class="font-medium">#${t.ticket_id || t.id}</div>
                                <div class="text-sm text-muted truncate">${t.title || '-'}</div>
                                <div class="text-xs text-muted">${t.entity || '-'}</div>
                            </div>
                        `).join('')}
                    `;
                    board.appendChild(colDiv);
                });

            } catch (err) {
                console.error(err);
                board.innerHTML = '<div class="text-center text-red-600 py-8">Erro ao carregar.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadKanban();
                setInterval(loadKanban, 3 * 60 * 1000);
            }, 100);
        });
    </script>
</body>
</html>
