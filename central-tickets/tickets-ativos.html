<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets Ativos - Central de Tickets</title>
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared-header.js"></script>
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <div class="page-header">
            <h1 class="text-2xl font-bold">Tickets Ativos</h1>
            <span id="totalCount" class="text-lg text-muted"></span>
        </div>

        <div class="rounded-lg border p-4 mb-4 flex justify-between items-center bg-surface">
            <div>
                <p class="text-sm text-muted">Total ativo</p>
                <p id="totalBigCount" class="text-4xl font-bold text-green-600">0</p>
            </div>
            <span id="lastUpdate" class="text-sm text-muted"></span>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">ID</th>
                        <th class="col-instance">Inst</th>
                        <th class="col-entity">Entidade</th>
                        <th class="col-status">Status</th>
                        <th class="col-group">Grupo</th>
                        <th class="col-technician">Técnico</th>
                        <th class="col-date">Abertura</th>
                        <th class="col-date">Atualização</th>
                        <th class="col-time">Tempo Espera</th>
                    </tr>
                </thead>
                <tbody id="ativosTableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        function calculateHoursSinceUpdate(lastUpdate) {
            if (!lastUpdate) return 0;
            return Math.floor((Date.now() - new Date(lastUpdate).getTime()) / (1000 * 60 * 60));
        }

        async function loadAtivosTickets() {
            const tbody = document.getElementById('ativosTableBody');
            const totalCountEl = document.getElementById('totalCount');
            const totalBigCountEl = document.getElementById('totalBigCount');
            const lastUpdateEl = document.getElementById('lastUpdate');

            tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8">Carregando...</td></tr>';

            try {
                const allTickets = [];
                let page = 0;
                const pageSize = 1000;
                let hasMore = true;

                while (hasMore) {
                    const { data, error } = await sbClient
                        .from('tickets_cache')
                        .select('*')
                        .in('status_key', ['processing', 'pending'])
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, (page + 1) * pageSize - 1);

                    if (error) throw error;
                    if (data?.length > 0) {
                        allTickets.push(...data);
                        page++;
                        if (data.length < pageSize) hasMore = false;
                    } else {
                        hasMore = false;
                    }
                }

                const total = allTickets.length;
                totalCountEl.textContent = `(${total})`;
                totalBigCountEl.textContent = total;
                lastUpdateEl.textContent = new Date().toLocaleTimeString('pt-BR');

                if (total === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8">Nenhum ticket ativo.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                allTickets.forEach(t => {
                    const hours = calculateHoursSinceUpdate(t.date_mod || t.lastUpdate);
                    let rowClass = t.isSlaLate ? 'sla-late' : hours > 72 ? 'alert-red' : hours > 24 ? 'alert-yellow' : '';
                    const timeText = hours > 72 ? `${hours}h (crítico)` : hours > 24 ? `${hours}h (atrasado)` : `${hours}h`;

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td class="col-id font-medium">#${t.ticket_id || t.id}</td>
                        <td class="col-instance"><span class="instance-badge ${t.instance?.toLowerCase()}">${t.instance}</span></td>
                        <td class="col-entity">${t.entity || '-'}</td>
                        <td class="col-status"><span class="status-badge ${t.status_key}">${t.status_name}</span></td>
                        <td class="col-group">${(t.group_name || '').split('>').pop().trim() || '-'}</td>
                        <td class="col-technician">${t.technician || 'Não atribuído'}</td>
                        <td class="col-date">${new Date(t.date_created).toLocaleString('pt-BR')}</td>
                        <td class="col-date">${new Date(t.date_mod).toLocaleString('pt-BR')}</td>
                        <td class="col-time font-medium">${timeText}</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-red-600 py-8">Erro ao carregar.</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadAtivosTickets();
                setInterval(loadAtivosTickets, 3 * 60 * 1000);
            }, 100);
        });
    </script>
</body>
</html>
