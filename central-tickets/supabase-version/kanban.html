<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Central de Tickets - Dashboard de Tickets GLPI">
    <title>Central de Tickets</title>
    <link rel="icon" href="favicon-peta.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --background: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            --status-new: #3b82f6;
            --status-processing: #f59e0b;
            --status-pending: #8b5cf6;
            --status-solved: #10b981;
            --status-closed: #6b7280;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --background: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 .page-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header h1 .title-main {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .header h1 .subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-logo-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-fallback svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nav-link.active:hover {
            background: var(--primary-dark);
            color: white;
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        .header-nav {
            display: flex;
            gap: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cache-actions {
            display: flex;
            gap: 4px;
        }

        .cache-btn {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .cache-btn:hover {
            background: var(--border);
            color: var(--primary);
        }

        .cache-btn svg {
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
        }

        .cache-btn:hover svg {
            color: var(--primary);
        }

        .theme-toggle {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }
            color: white;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .last-update {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .refresh-countdown {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .refresh-countdown::before {
            content: "⏱️ ";
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .main {
            flex: 1;
            padding: 24px;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            color: #ef4444;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--text-secondary);
            max-width: 400px;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        .filtered-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        @media (max-width: 1600px) {
            .kanban-board {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1100px) {
            .kanban-board {
                grid-template-columns: repeat(2, 1fr);
            }
            .filtered-board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            .filtered-board {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            
            .header-nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-link {
                flex: 1;
                justify-content: center;
                min-width: 100px;
            }

            .header-right {
                width: 100%;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }

            .main {
                padding: 16px;
            }
        }

        @media (max-width: 500px) {
            .header-nav {
                display: none;
            }
        }

        .kanban-column {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 180px);
            overflow: hidden;
        }

        .column-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.new { background: var(--status-new); }
        .status-dot.processing { background: var(--status-processing); }
        .status-dot.pending { background: var(--status-pending); }
        .status-dot.solved { background: var(--status-solved); }
        .status-dot.closed { background: var(--status-closed); }

        .column-count {
            background: var(--background);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .column-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .column-content::-webkit-scrollbar {
            width: 6px;
        }

        .column-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .column-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .load-more-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: var(--background);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            background: var(--surface);
            border-color: var(--primary);
            color: var(--primary);
        }

        .ticket-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ticket-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
        table { table-layout: fixed; width: 100%; }
        th, td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            transform: translateY(-2px);
        }

        .ticket-card.new { border-left: 3px solid var(--status-new); }
        .ticket-card.processing { border-left: 3px solid var(--status-processing); }
        .ticket-card.pending { border-left: 3px solid var(--status-pending); }
        .ticket-card.solved { border-left: 3px solid var(--status-solved); }
        .ticket-card.closed { border-left: 3px solid var(--status-closed); }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 10px;
        }

        .ticket-id {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
        }

        .ticket-entity {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--background);
            padding: 2px 8px;
            border-radius: 4px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-category {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticket-category svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .ticket-dates {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .ticket-date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-date-label {
            color: var(--text-muted);
        }

        .ticket-date-value {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .pending-time {
            background: rgba(139, 92, 246, 0.1);
            color: var(--status-pending);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .pending-time svg {
            width: 14px;
            height: 14px;
        }

        .empty-column {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background);
        }

        .btn-secondary.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .ticket-card.urgent {
            border-color: #f59e0b;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent);
        }

        .ticket-card.urgent.processing {
            border-left-color: var(--status-processing);
        }

        .ticket-card.urgent.pending {
            border-left-color: var(--status-pending);
        }

        .instance-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .instance-badge.peta {
            background: rgba(37, 99, 235, 0.15);
            color: #2563eb;
        }

        .instance-badge.gmx {
            background: rgba(234, 88, 12, 0.15);
            color: #ea580c;
        }

        .sla-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .sla-badge.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .sla-badge.late {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .sla-countdown {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sla-countdown.warning {
            color: var(--status-processing);
        }

        .sla-countdown.critical {
            color: var(--sla-late);
            font-weight: 600;
        }

        .sla-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.65rem;
        }

        .ticket-entity-mini {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-card .ticket-id a {
            color: var(--primary);
            text-decoration: none;
        }

        .ticket-card .ticket-id a:hover {
            text-decoration: underline;
        }

        .instance-dropdown {
            position: relative;
        }

        .instance-dropdown-header {
            padding: 8px 12px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            user-select: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .instance-dropdown-header:hover {
            border-color: var(--primary);
            background: var(--surface);
        }

        .instance-dropdown-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .instance-dropdown.open .instance-dropdown-header svg {
            transform: rotate(180deg);
        }

        .instance-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .instance-dropdown.open .instance-dropdown-menu {
            display: block;
        }

        .instance-dropdown-option {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .instance-dropdown-option:hover {
            background: var(--background);
        }

        .instance-dropdown-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .instance-dropdown-option.peta {
            color: #2563eb;
        }

        .instance-dropdown-option.gmx {
            color: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <h1>
                        <span class="header-logo">
                            <img src="favicon-peta.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            <span class="header-logo-fallback" style="display: none;">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </span>
                        </span>
                        <span class="page-title">
                            <span class="title-main">Central de Tickets</span>
                            <span class="subtitle">Kanban</span>
                        </span>
                    </h1>
                </div>
                <nav class="header-nav">
                    <a href="index.html" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Dashboard
                    </a>
                    <a href="kanban.html" class="nav-link active">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                            <line x1="15" y1="3" x2="15" y2="21"></line>
                        </svg>
                        Kanban
                    </a>
                    <a href="tickets-ativos.html" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        Tickets Ativos
                    </a>
                    <a href="tickets-em-espera.html" class="nav-link">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Em Espera
                    </a>
                </nav>
                <div class="header-right">
                    <div class="cache-actions">
                        <button class="cache-btn" onclick="exportToJSON()" title="Exportar dados para JSON">

        // ========== SUPABASE SYNC ==========
        async function syncTicketsToSupabase(glpiTickets, instanceName) {
            try {
                console.log(`[Supabase] Sincronizando ${glpiTickets.length} tickets de ${instanceName}...`);
                
                const ticketsToUpsert = glpiTickets.map(ticket => ({
                    glpi_id: ticket.id,
                    instance: instanceName.toUpperCase(),
                    title: ticket.title || ticket.name || '',
                    content: ticket.content || ticket.description || '',
                    entity: ticket.entity || '',
                    category: ticket.category || '',
                    technician: ticket.technician || ticket.user || '',
                    status: ticket.status || 1,
                    date_opening: ticket.date_creation || ticket.date || null,
                    date_takeaccount: ticket.date_takeaccount || null,
                    date_solve: ticket.solvedate || null,
                    date_close: ticket.closedate || null,
                    internal_time_to_own: ticket.time_to_own || null,
                    internal_time_to_resolve: ticket.time_to_resolve || null,
                    sla_percentage_first: ticket.sla_agreement_tto_percent_done || null,
                    sla_percentage_resolve: ticket.sla_agreement_ttr_percent_done || null,
                    is_overdue_first: ticket.is_late === '1' || ticket.time_to_own <= 0,
                    is_overdue_resolve: ticket.is_late === '1' || ticket.time_to_resolve <= 0,
                    updated_at: new Date().toISOString()
                }));

                const { data, error } = await sbClient
                    .from('tickets')
                    .upsert(ticketsToUpsert, { 
                        onConflict: 'glpi_id,instance',
                        ignoreDuplicates: false 
                    });

                if (error) {
                    console.error('[Supabase] Erro ao sincronizar:', error);
                    return false;
                }

                console.log(`[Supabase] ${glpiTickets.length} tickets sincronizados com sucesso!`);
                return true;
            } catch (err) {
                console.error('[Supabase] Erro na sincronização:', err);
                return false;
            }
        }

        async function fetchTicketsFromSupabase(instanceFilter = null) {
            try {
                let query = supabase
                    .from('tickets')
                    .select('*')
                    .order('date_opening', { ascending: false });

                if (instanceFilter && instanceFilter.length > 0) {
                    query = query.in('instance', instanceFilter.map(i => i.toUpperCase()));
                }

                const { data, error } = await query;

                if (error) {
                    console.error('[Supabase] Erro ao buscar tickets:', error);
                    return null;
                }

                return data || [];
            } catch (err) {
                console.error('[Supabase] Erro ao buscar tickets:', err);
                return null;
            }
        }

        async function getLastSyncTime() {
            try {
                const { data, error } = await sbClient
                    .from('tickets')
                    .select('updated_at')

                if (error) return null;
                return data && data.length > 0 ? data[0].updated_at : null;
            } catch {
                return null;
            }
        }

        // Função para atualizar o contador regressivo
        function updateCountdown() {
            if (!nextRefreshTime) return;
            
            const now = Date.now();
            const remaining = Math.max(0, nextRefreshTime - now);
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            const countdownEl = document.getElementById('refreshCountdown');
            if (countdownEl) {
                countdownEl.textContent = `Próximo refresh: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // Função para iniciar o contador regressivo
        function startCountdown() {
            nextRefreshTime = Date.now() + REFRESH_INTERVAL;
            updateCountdown();
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(updateCountdown, 1000);
        }

        // Função para iniciar sessão na API - tenta diferentes endpoints
        async function initSession() {
            let lastError = null;
            
            for (const baseUrl of API_ENDPOINTS) {
                try {
                    console.log(`Tentando autenticar em: ${baseUrl}`);
                    
                    const response = await fetch(`${baseUrl}/initSession`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `user_token ${API_CONFIG.USER_TOKEN}`,
                            'App-Token': API_CONFIG.APP_TOKEN,
                        },
                    });

                    if (response.ok) {
                        const data = await response.json();
                        sessionToken = data.session_token;
                        API_CONFIG.BASE_URL = baseUrl; // Usar o endpoint que funcionou
                        console.log('Autenticação bem-sucedida!');
                        return sessionToken;
                    }
                    
                    const errorText = await response.text();
                    console.log(`Endpoint ${baseUrl} retornou ${response.status}: ${errorText}`);
                    lastError = new Error(`Erro ${response.status} em ${baseUrl}`);
                    
                } catch (error) {
                    console.log(`Endpoint ${baseUrl} falhou:`, error.message);
                    lastError = error;
                }
            }
            
            // Se nenhum endpoint funcionou, lançar erro detalhado
            console.error('Falha na autenticação em todos os endpoints:', lastError);
            throw lastError || new Error('Falha na autenticação');
        }

        // Função para encerrar sessão
        async function killSession() {
            for (const instanceName of Object.keys(INSTANCES)) {
                if (sessionTokens[instanceName]) {
                    try {
                        await fetch(`${INSTANCES[instanceName].BASE_URL}/killSession/`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': INSTANCES[instanceName].APP_TOKEN,
                            },
                        });
                    } catch (error) {
                        console.error(`Erro ao encerrar sessão ${instanceName}:`, error);
                    }
                }
            }
            sessionTokens = {};
        }

        // Função para iniciar sessão em uma instância
        async function initSession(instanceName) {
            const instance = INSTANCES[instanceName];
            try {
                const response = await fetch(`${instance.BASE_URL}/initSession`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `user_token ${instance.USER_TOKEN}`,
                        'App-Token': instance.APP_TOKEN,
                    },
                });

                if (!response.ok) {
                    throw new Error(`Erro ao iniciar sessão em ${instanceName}: ${response.status}`);
                }

                const data = await response.json();
                sessionTokens[instanceName] = data.session_token;
                return data.session_token;
            } catch (error) {
                console.error(`Erro na autenticação ${instanceName}:`, error);
                throw error;
            }
        }

        // Cache de nomes de usuários para evitar múltiplas chamadas
        const userNameCache = {};

        // Função para buscar nome de usuário pelo ID usando a API de busca
        async function getUserName(userId, instanceName) {
            if (!userId) return '';
            
            const cacheKey = `${instanceName}_${userId}`;
            // In-memory cache
            if (userNameCache[cacheKey]) {
                return userNameCache[cacheKey];
            }
            // Persistent cache (localStorage) with TTL
            const cachedPersist = window.loadUserNameFromCache?.(instanceName, userId);
            if (cachedPersist) {
                userNameCache[cacheKey] = cachedPersist;
                return cachedPersist;
            }

            try {
                const instance = INSTANCES[instanceName];
                
                // Verificar se sessão ainda é válida
                if (!sessionTokens[instanceName]) {
                    await initSession(instanceName);
                }
                
                // Usar a API de busca para buscar usuário por ID
                const searchParams = new URLSearchParams({
                    'criteria[0][link]': 'AND',
                    'criteria[0][field]': '1',
                    'criteria[0][searchtype]': 'equals',
                    'criteria[0][value]': userId.toString(),
                    'range': '0-0',
                    'uid_cols': 'true',
                });

                const response = await fetch(
                    `${instance.BASE_URL}/search/User?${searchParams.toString()}`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Session-Token': sessionTokens[instanceName],
                            'App-Token': instance.APP_TOKEN,
                        },
                    }
                );

                if (!response.ok) {
                    const cachedPersist2 = window.loadUserNameFromCache?.(instanceName, userId);
                    if (cachedPersist2) {
                        userNameCache[cacheKey] = cachedPersist2;
                        return cachedPersist2;
                    }
                    return userId.toString();
                }

                const data = await response.json();
                let userName = userId.toString();

                if (data.data && data.data.length > 0) {
                    const user = data.data[0];
                    userName = user['2'] || userName;
                    if (user['5'] && user['5'] !== userName) {
                        userName = `${user['5']} ${userName}`;
                    }
                }

                userNameCache[cacheKey] = userName;
                window.saveUserNameToCache?.(instanceName, userId, userName);
                return userName;
            } catch (error) {
                console.error(`Erro ao buscar nome do usuário ${userId}:`, error);
                const cachedPersist3 = window.loadUserNameFromCache?.(instanceName, userId);
                if (cachedPersist3) {
                    userNameCache[cacheKey] = cachedPersist3;
                    return cachedPersist3;
                }
                return userId.toString();
            }
        }

        // Função para resolver nomes de técnicos para um batch de tickets
        async function resolveTechnicianNamesForPage(tickets, instanceName) {
            const userIds = new Set();
            
            tickets.forEach(ticket => {
                const assigned = ticket[4];
                if (assigned) {
                    if (Array.isArray(assigned)) {
                        assigned.forEach(id => userIds.add(id));
                    } else {
                        userIds.add(assigned);
                    }
                }
            });

            await Promise.all(Array.from(userIds).map(userId => 
                getUserName(userId, instanceName)
            ));

            return tickets.map(ticket => {
                const assigned = ticket[4];
                let technicianName = '';
                
                if (assigned) {
                    if (Array.isArray(assigned) && assigned.length > 0) {
                        technicianName = userNameCache[`${instanceName}_${assigned[0]}`] || assigned[0].toString();
                    } else {
                        technicianName = userNameCache[`${instanceName}_${assigned}`] || assigned.toString();
                    }
                }

                return {
                    ...ticket,
                    _technicianName: technicianName
                };
            });
        }

        // Função para buscar tickets de uma instância
        async function getTicketsFromInstance(instanceName) {
            try {
                let allTickets = [];
                let page = 0;
                const pageSize = 100;
                const maxTickets = 500;
                let hasMore = true;
                
                console.log(`[${instanceName}] Carregando tickets para Kanban (max: ${maxTickets})...`);

                while (hasMore && allTickets.length < maxTickets) {
                    const remainingSlots = maxTickets - allTickets.length;
                    const currentPageSize = Math.min(pageSize, remainingSlots);
                    
                    let query = window._sb
                        .from('tickets_cache')
                        .select('*')
                        .eq('instance', instanceName.toUpperCase())
                        .not('status_key', 'in', '("solved","closed")')
                        .order('date_mod', { ascending: false })
                        .range(page * pageSize, page * pageSize + currentPageSize - 1);

                    const { data, error } = await query;

                    if (error) {
                        console.error(`Erro ao buscar tickets de ${instanceName} do Supabase:`, error);
                        return [];
                    }

                    if (!data || data.length === 0) {
                        hasMore = false;
                    } else {
                        allTickets = [...allTickets, ...data];
                        page++;
                        console.log(`[${instanceName}] Carregados ${allTickets.length} tickets`);
                        if (data.length < pageSize || allTickets.length >= maxTickets) {
                            hasMore = false;
                        }
                    }
                }

                console.log(`[${instanceName}] Total carregado: ${allTickets.length} tickets (limite: ${maxTickets})`);

        async function getAllTickets() {

            const allTickets = [];
            
            for (const instanceName of selectedInstances) {
                try {
                    const instanceTickets = await getTicketsFromInstance(instanceName);

        // Fetch technician names from GLPI using Ticket_User API (type=2 for assigned)
        async function fetchTechniciansFromGLPI(tickets, instanceName) {
            if (!tickets || tickets.length === 0) return tickets;
            
            const ticketsWithCache = tickets.map(ticket => ({
                ...ticket,
                technician: ticket.technician || ''
            }));
            
            try {
                const sessionToken = await initGLPISessionKanban(instanceName);
                const instance = INSTANCES[instanceName];
                
                for (let i = 0; i < ticketsWithCache.length; i++) {
                    const ticket = ticketsWithCache[i];
                    
                    if (ticket.technician) continue;
                    
                    try {
                        const response = await fetch(
                            `${instance.BASE_URL}/Ticket/${ticket.ticket_id}/Ticket_User`,
                            {
                                method: 'GET',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Session-Token': sessionToken,
                                    'App-Token': instance.APP_TOKEN,
                                },
                            }
                        );
                        
                        if (response.ok) {
                            const actors = await response.json();
                            const technician = actors?.find(a => a.type === 2);
                            
                            if (technician?.users_id) {
                                const userResponse = await fetch(
                                    `${instance.BASE_URL}/User/${technician.users_id}`,
                                    {
                                        method: 'GET',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'Session-Token': sessionToken,
                                            'App-Token': instance.APP_TOKEN,
                                        },
                                    }
                                );
                                
                                if (userResponse.ok) {
                                    const user = await userResponse.json();
                                    const name = [user.firstname, user.realname].filter(Boolean).join(' ') || user.name || technician.users_id.toString();
                                    ticketsWithCache[i].technician = name;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`Failed to fetch technician for ticket ${ticket.ticket_id}:`, e);
                    }
                }
            } catch (e) {
                console.error('Error fetching technicians from GLPI:', e);
            }
            
            return ticketsWithCache;
        }

        }

        function processTickets(rawTickets, instanceName) {
            return rawTickets.map(ticket => {
                const statusId = parseInt(ticket[12]) || 1;
                const statusInfo = TICKET_STATUS[statusId] || TICKET_STATUS[1];
                const displayStatusName = (statusId === 7 && statusInfo?.waitText) ? statusInfo.waitText : (statusInfo?.name || '');

                return {

                    statusColor: statusInfo.color,
                    dateCreated: ticket[15] || ticket.date_creation,
                    dueDate: ticket[151] || ticket.due_date,
                    timePending: statusInfo.key === 'pending' ? calculatePendingTime(ticket) : null,
                    isSlaLate: isSlaExceeded(ticket[151] || ticket.due_date),
                    instance: instanceName,
                    instanceUrl: INSTANCES[instanceName].TICKET_URL,
                };
            });

        function isSlaExceeded(dueDateStr) {

            const dueDate = new Date(dueDateStr);

        // Função para calcular tempo em pendência
        function calculatePendingTime(ticket) {
            const lastUpdate = ticket[91] || ticket.date_creation;
            if (!lastUpdate) return null;

            const updateDate = new Date(lastUpdate);
            const now = new Date();
            const diffMs = now - updateDate;

            return formatDuration(diffMs);
        }

        // Função para formatar duração
        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) {
                const remainingHours = hours % 24;
                if (remainingHours > 0) {
                    return `há ${days} dia${days > 1 ? 's' : ''} e ${remainingHours} hora${remainingHours > 1 ? 's' : ''}`;
                }
                return `há ${days} dia${days > 1 ? 's' : ''}`;
            }
            
            if (hours > 0) {
                return `há ${hours} hora${hours > 1 ? 's' : ''}`;
            }
            
            if (minutes > 0) {
                return `há ${minutes} minuto${minutes > 1 ? 's' : ''}`;
            }
            
            return 'há poucos segundos';
        }

        // Função para formatar data
        function formatShortDate(dateString) {
            if (!dateString) return 'N/A';
            
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'N/A';
                
                return date.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                });
            } catch {
                return 'N/A';
            }
        }

        // Incremental Kanban loading
        async function fetchFromKanbanPaged(instanceName, page, batchSize) {
            const inst = INSTANCES[instanceName];
            if (!inst) return [];
            if (!sessionTokens[instanceName]) await initSession(instanceName);
            const start = page * batchSize;
            const end = start + batchSize - 1;
            const searchParams = new URLSearchParams({ range: `${start}-${end}`, expand_dropdowns: 'true', get_hateoas: 'false' });
            try {
                const resp = await fetch(`${inst.BASE_URL}/search/Ticket?${searchParams.toString()}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Session-Token': sessionTokens[instanceName],
                        'App-Token': inst.APP_TOKEN
                    }
                });
                if (!resp.ok) return [];
                const data = await resp.json();
                const rows = data?.data ?? [];
                return rows.map(t => ({
                    id: t.ticket_id ?? t.id,
                    title: t.title ?? t.name ?? '',
                    entity: t.entity ?? '',
                    entityFull: t.entity_full ?? t.entity ?? '',
                    category: t.category ?? t[7] ?? 'Não categorizado',
                    statusId: t.status_id ?? parseInt(t[12]) ?? 2,
                    status: t.status_key ?? t.status ?? 'processing',
                    statusName: t.status_name ?? t.statusName ?? 'Em atendimento',
                    group: t.group_name ?? t.group ?? t[8] ?? 'Não atribuído',
                    dateCreated: t.date_created ?? t.date_creation ?? '',
                    dueDate: t.due_date ?? t[151] ?? '',
                    isSlaLate: t.is_sla_late ?? false,
                    instance: instanceName,
                    instanceUrl: INSTANCES[instanceName]?.TICKET_URL ?? '',
                    _source: t
                }));
            } catch {
                return [];
            }
        }

            try {
                const cacheData = {
                    tickets: tickets,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                localStorage.setItem(CACHE_TIMESTAMP_KEY, new Date().toISOString());
                console.log('💾 Cache salvo com sucesso');
                return true;
            } catch (error) {
                console.error('❌ Erro ao salvar cache:', error);
                return false;

            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const cacheData = JSON.parse(cached);
                    console.log('📂 Cache carregado de:', new Date(cacheData.timestamp).toLocaleString('pt-BR'));
                    return cacheData.tickets;
                }
            } catch (error) {
                console.error('❌ Erro ao carregar cache:', error);

            return null;

        function exportToJSON() {
            if (tickets.length === 0) {
                alert('Nenhum ticket para exportar. Carregue os dados primeiro.');
                return;
            }

            const exportData = {
                exportedAt: new Date().toISOString(),
                totalTickets: tickets.length,
                instances: {
                    peta: tickets.filter(t => t.instance === 'Peta').length,
                    gmx: tickets.filter(t => t.instance === 'GMX').length
                },
                tickets: tickets
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `tickets_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log('📤 Exportação concluída');
        }

        function importFromJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        if (importedData.tickets && Array.isArray(importedData.tickets)) {
                            if (confirm(`Importar ${importedData.tickets.length} tickets de ${importedData.exportedAt ? new Date(importedData.exportedAt).toLocaleDateString('pt-BR') : 'data desconhecida'}?\n\nIsso substituirá os dados atuais.`)) {
                                tickets = importedData.tickets;
                                saveCache();
                                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                                renderKanban(tickets);
                                alert(`✅ ${tickets.length} tickets importados com sucesso!`);
                            }
                        } else {
                            alert('❌ Arquivo JSON inválido. Verifique o formato.');
                        }
                    } catch (error) {
                        alert('❌ Erro ao ler arquivo: ' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        // Função para atualizar tickets
        async function refreshTickets() {
            if (isLoading) return;
            
            isLoading = true;
            const refreshBtn = document.getElementById('refreshBtn');
            if (refreshBtn) refreshBtn.disabled = true;
            showLoading();

            try {
                tickets = await getAllTickets();
                saveCache();
                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                renderKanban(tickets);
                
                // Atualizar última atualização
                const lastUpdateEl = document.getElementById('lastUpdate');
                if (lastUpdateEl) {
                    lastUpdateEl.textContent = `Última atualização: ${getCurrentTimeFormatted()}`;
                }
                
                // Reiniciar contador regressivo
                startCountdown();
                
                console.log('✅ Atualização concluída com sucesso');
            } catch (error) {
                console.error('❌ Erro na atualização:', error);
                showError(
                    'Erro ao carregar tickets',
                    'Verifique sua conexão, credenciais ou tente novamente mais tarde.',
                    {
                        message: error.message,
                        baseUrl: API_CONFIG.BASE_URL,
                        stack: error.stack
                    }
                );
            } finally {
                isLoading = false;
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        function formatCountdown(dueDateStr) {
            if (!dueDateStr) return null;
            
            const dueDate = new Date(dueDateStr);
            const now = new Date();
            const diff = dueDate - now;
            
            if (diff <= 0) {
                return { text: 'Expirado', class: 'critical' };
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            if (days > 0) {
                return { text: `${days}d ${hours}h`, class: diff < 24 * 60 * 60 * 1000 ? 'warning' : '' };
            }
            
            if (hours > 0) {
                return { text: `${hours}h ${minutes}m`, class: diff < 60 * 60 * 1000 ? 'warning' : '' };
            }
            
            return { text: `${minutes}m ${seconds}s`, class: 'critical' };
        }

        function updateSlaCountdowns() {
            const countdowns = document.querySelectorAll('.sla-countdown');
            countdowns.forEach(el => {
                const dueDate = el.getAttribute('data-due');
                if (dueDate) {
                    const result = formatCountdown(dueDate);
                    if (result) {
                        el.textContent = result.text;
                        el.className = 'sla-countdown' + (result.class ? ' ' + result.class : '');
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Inicializar Supabase cache
            const supabaseUrl = window.APP_CONFIG?.SUPABASE_URL || '';
            const supabaseKey = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
            if (supabaseUrl && supabaseKey) {
                SupabaseCache.init(supabaseUrl, supabaseKey);
                console.log('✅ Supabase Cache inicializado');
            }

            initTheme();
            initInstanceDropdown();
            
            // Always load from Supabase directly (no localStorage cache)
            refreshTickets();

            // Configurar atualização automática
            refreshTimer = setInterval(refreshTickets, REFRESH_INTERVAL);
            countdownTimer = setInterval(updateSlaCountdowns, 1000);
            startCountdown();
        });

        // Cleanup ao sair da página
        window.addEventListener('beforeunload', () => {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
            killSession();
        });
    </script>
</body>
</html>
