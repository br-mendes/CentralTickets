<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Tickets - Login</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #10b981;
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .logo-fallback {
            display: none;
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 16px;
            align-items: center;
            justify-content: center;
        }

        .logo-fallback svg {
            width: 48px;
            height: 48px;
            color: white;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--background);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgb(37 99 235 / 0.1);
        }

        input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text);
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            display: none;
        }

        .alert.error {
            background: rgb(239 68 68 / 0.1);
            color: var(--error);
            border: 1px solid rgb(239 68 68 / 0.2);
            display: block;
        }

        .alert.success {
            background: rgb(16 185 129 / 0.1);
            color: var(--success);
            border: 1px solid rgb(16 185 129 / 0.2);
            display: block;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 16px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--background);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text);
        }

        .user-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--background);
            border-radius: 8px;
        }

        .user-email {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-role.gestor {
            color: var(--primary);
        }

        .user-role.colab {
            color: #7c3aed;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moonIcon" style="display:none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo-container">
                <img src="favicon-peta.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="logo-fallback" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </span>
            </div>
            <h1>Central de Tickets</h1>
            <p class="subtitle">Faça login para continuar</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <div id="loginSection">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                    <div id="emailError" class="error-message">E-mail inválido</div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Sua senha" required>
                    <div id="passwordError" class="error-message">Senha incorreta</div>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginText">Entrar</span>
                    <div id="loginSpinner" class="loading-spinner hidden"></div>
                </button>
            </form>
        </div>

        <div id="loggedInSection" class="hidden">
            <div class="user-info">
                <div class="user-email" id="userEmail"></div>
                <div class="user-role" id="userRole"></div>
            </div>
            <button class="btn btn-primary" onclick="handleLogout()">
                Sair
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const loginSb = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('sunIcon').style.display = 'block';
                document.getElementById('moonIcon').style.display = 'none';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        function showAlert(message, type = 'error') {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = 'alert ' + type;
        }

        function hideAlert() {
            document.getElementById('alertMessage').className = 'alert';
        }

        function showLoggedIn(email, role) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('loggedInSection').classList.remove('hidden');
            document.getElementById('userEmail').textContent = email;
            document.getElementById('userRole').textContent = role === 'gestor' ? 'Gestor' : 'Colaborador';
            document.getElementById('userRole').className = 'user-role ' + role;
        }

        function setLoading(isLoading) {
            document.getElementById('loginBtn').disabled = isLoading;
            document.getElementById('loginText').classList.toggle('hidden', isLoading);
            document.getElementById('loginSpinner').classList.toggle('hidden', !isLoading);
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideAlert();
            setLoading(true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await loginSb.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showAlert(error.message);
                    setLoading(false);
                    return;
                }

                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError) {
                    localStorage.setItem('userRole', 'colab');
                } else {
                    localStorage.setItem('userRole', profile.role);
                }

                localStorage.setItem('userEmail', email);
                localStorage.setItem('userId', data.user.id);

                showAlert('Login realizado com sucesso!', 'success');
                setTimeout(() => {
                    redirectAfterLogin(profile?.role || 'colab');
                }, 500);

            } catch (err) {
                showAlert('Erro ao fazer login. Tente novamente.');
                setLoading(false);
            }
        }

        async function handleLogout() {
            const { error } = await loginSb.auth.signOut();
            
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userId');
            localStorage.removeItem('userRole');
            localStorage.removeItem('session');

            showAlert('Logout realizado!', 'success');
            setTimeout(() => {
                window.location.reload();
            }, 500);
        }

        function redirectAfterLogin(role) {
            const redirect = new URLSearchParams(window.location.search).get('redirect');
            
            if (redirect) {
                window.location.href = redirect;
                return;
            }

            if (role === 'gestor') {
                window.location.href = 'index.html';
            } else {
                window.location.href = 'kanban.html';
            }
        }

        async function checkAuth() {
            initTheme();
            
            const session = localStorage.getItem('session');
            const userId = localStorage.getItem('userId');
            const userRole = localStorage.getItem('userRole');
            const userEmail = localStorage.getItem('userEmail');

            if (session && userId) {
                showLoggedIn(userEmail, userRole);
            }
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
