<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Central de Tickets - Dashboard de Tickets GLPI">
    <title>Central de Tickets</title>
    <script src="incremental-loader.js"></script>
    <link rel="icon" href="favicon-peta.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --background: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            --status-new: #3b82f6;
            --status-processing: #22c55e;
            --status-pending: #f97316;
            --status-approval: #f97316;
            --status-solved: #6b7280;
            --status-closed: #1f2937;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        [data-theme="dark"] {
            --background: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s, color 0.3s;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 .page-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .header h1 .title-main {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .header h1 .subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-logo-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo-fallback svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .theme-toggle {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .last-update {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .refresh-countdown {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .refresh-countdown::before {
            content: "⏱️ ";
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .main {
            flex: 1;
            padding: 24px;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--background) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 16px;
        }

        .skeleton-text {
            height: 16px;
            width: 100%;
            margin-bottom: 8px;
        }

        .skeleton-text-short {
            height: 16px;
            width: 40%;
        }

        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .skeleton-table-row {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 16px;
        }

        .skeleton-table-row .skeleton {
            height: 20px;
        }
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
            text-align: center;
            padding: 24px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            color: #ef4444;
        }

        .error-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--text-secondary);
            max-width: 400px;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        .filtered-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            min-height: calc(100vh - 180px);
        }

        @media (max-width: 1600px) {
            .kanban-board {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 1100px) {
            .kanban-board {
                grid-template-columns: repeat(2, 1fr);
            }
            .filtered-board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            .filtered-board {
                grid-template-columns: 1fr;
            }
            .summary-dashboard {
                grid-template-columns: 1fr 1fr;
            }
            .nav-links {
                flex-wrap: wrap;
            }
            .nav-link {
                flex: 1;
                justify-content: center;
                min-width: 120px;
            }
        }

        @media (max-width: 600px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-actions {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
            }
            
            .main {
                padding: 16px;
            }

            .summary-dashboard {
                grid-template-columns: 1fr;
                padding: 0;
            }

            .instance-cards {
                grid-template-columns: 1fr;
            }

            .quick-actions {
                flex-direction: column;
            }

            .quick-action {
                width: 100%;
            }

            .header-nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-link {
                flex: 1;
                justify-content: center;
                min-width: 100px;
            }

            .header-right {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 500px) {
            .header-nav {
                display: none;
            }
        }

        .instance-dropdown {
            position: relative;
        }

        .instance-dropdown-header {
            padding: 8px 12px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            user-select: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .instance-dropdown-header:hover {
            border-color: var(--primary);
            background: var(--surface);
        }

        .instance-dropdown-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .instance-dropdown.open .instance-dropdown-header svg {
            transform: rotate(180deg);
        }

        .instance-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .instance-dropdown.open .instance-dropdown-menu {
            display: block;
        }

        .instance-dropdown-option {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .instance-dropdown-option:hover {
            background: var(--background);
        }

        .instance-dropdown-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .instance-dropdown-option.peta {
            color: #2563eb;
        }

        .instance-dropdown-option.gmx {
            color: #7c3aed;
        }

        .kanban-column {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 180px);
            overflow: hidden;
        }

        .column-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.new { background: var(--status-new); }
        .status-dot.processing { background: var(--status-processing); }
        .status-dot.pending { background: var(--status-pending); }
        .status-dot.solved { background: var(--status-solved); }
        .status-dot.closed { background: var(--status-closed); }

        .column-count {
            background: var(--background);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .column-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .column-content::-webkit-scrollbar {
            width: 6px;
        }

        .column-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .column-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .load-more-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: var(--background);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            background: var(--surface);
            border-color: var(--primary);
            color: var(--primary);
        }

        .ticket-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ticket-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .ticket-card.new { border-left: 3px solid var(--status-new); }
        .ticket-card.processing { border-left: 3px solid var(--status-processing); }
        .ticket-card.pending { border-left: 3px solid var(--status-pending); }
        .ticket-card.solved { border-left: 3px solid var(--status-solved); }
        .ticket-card.closed { border-left: 3px solid var(--status-closed); }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 4px;
        }

        .ticket-status {
            margin-bottom: 6px;
        }

        .ticket-id {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
        }

        .ticket-entity {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--background);
            padding: 2px 8px;
            border-radius: 4px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-category {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticket-category svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .ticket-dates {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .ticket-date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-date-label {
            color: var(--text-muted);
        }

        .ticket-date-value {
            font-weight: 500;
            color: var(--text-secondary);
        }

        .pending-time {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }

        .pending-time svg {
            width: 14px;
            height: 14px;
        }

        .empty-column {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background);
        }

        .btn-secondary.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .view-indicator {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .view-indicator.processing {
            background: var(--status-processing);
        }

        .view-indicator.pending {
            background: var(--status-pending);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .status-badge.new {
            background: rgba(59, 130, 246, 0.15);
            color: var(--status-new);
        }

        .status-badge.processing {
            background: rgba(34, 197, 94, 0.15);
            color: var(--status-processing);
        }

        .status-badge.pending {
            background: rgba(249, 115, 22, 0.15);
            color: var(--status-pending);
        }

        .status-badge.pending-approval {
            background: rgba(249, 115, 22, 0.15);
            color: var(--status-pending);
        }

        .status-badge.solved {
            background: rgba(107, 114, 128, 0.15);
            color: var(--status-solved);
        }

        .status-badge.closed {
            background: rgba(31, 41, 55, 0.25);
            color: var(--status-closed);
        }

        .status-badge svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        .priority-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .priority-badge.low {
            background: rgba(107, 114, 128, 0.15);
            color: #6b7280;
        }

        .priority-badge.medium {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .priority-badge.high {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
        }

        .priority-badge.urgent {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .priority-badge.critical {
            background: rgba(153, 27, 27, 0.2);
            color: #991b1b;
        }

        .priority-badge svg {
            width: 10px;
            height: 10px;
            flex-shrink: 0;
        }

        .ticket-card.urgent {
            border-color: #f59e0b;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent);
        }

        .ticket-card.urgent.processing {
            border-left-color: var(--status-processing);
        }

        .ticket-card.urgent.pending {
            border-left-color: var(--status-pending);
        }

        .instance-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .instance-badge.peta {
            background: rgba(37, 99, 235, 0.15);
            color: #2563eb;
        }

        .instance-badge.gmx {
            background: rgba(234, 88, 12, 0.15);
            color: #ea580c;
        }

        .ticket-entity-mini {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ticket-card .ticket-id a {
            color: var(--primary);
            text-decoration: none;
        }

        .ticket-card .ticket-id a:hover {
            text-decoration: underline;
        }

        .summary-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.2s;
        }

        .summary-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .summary-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .summary-card-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-card-title svg {
            width: 18px;
            height: 18px;
        }

        .summary-card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .summary-card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .summary-subitem {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
        }

        .summary-subitem-dot {

        // ========== SUPABASE SYNC ==========
        async function syncTicketsToSupabase(glpiTickets, instanceName) {
            try {
                console.log(`[Supabase] Sincronizando ${glpiTickets.length} tickets de ${instanceName}...`);
                
                const ticketsToUpsert = glpiTickets.map(ticket => ({
                    glpi_id: ticket.id,
                    instance: instanceName.toUpperCase(),
                    title: ticket.title || ticket.name || '',
                    content: ticket.content || ticket.description || '',
                    entity: ticket.entity || '',
                    category: ticket.category || '',
                    technician: ticket.technician || ticket.user || '',
                    status: ticket.status || 1,
                    date_opening: ticket.date_creation || ticket.date || null,
                    date_takeaccount: ticket.date_takeaccount || null,
                    date_solve: ticket.solvedate || null,
                    date_close: ticket.closedate || null,
                    internal_time_to_own: ticket.time_to_own || null,
                    internal_time_to_resolve: ticket.time_to_resolve || null,
                    sla_percentage_first: ticket.sla_agreement_tto_percent_done || null,
                    sla_percentage_resolve: ticket.sla_agreement_ttr_percent_done || null,
                    is_overdue_first: ticket.is_late === '1' || ticket.time_to_own <= 0,
                    is_overdue_resolve: ticket.is_late === '1' || ticket.time_to_resolve <= 0,
                    updated_at: new Date().toISOString()
                }));

                const { data, error } = await sbClient
                    .from('tickets')
                    .upsert(ticketsToUpsert, { 
                        onConflict: 'glpi_id,instance',
                        ignoreDuplicates: false 
                    });

                if (error) {
                    console.error('[Supabase] Erro ao sincronizar:', error);
                    return false;
                }

                console.log(`[Supabase] ${glpiTickets.length} tickets sincronizados com sucesso!`);
                return true;
            } catch (err) {
                console.error('[Supabase] Erro na sincronização:', err);
                return false;
            }
        }

        async function fetchTicketsFromSupabase(instanceFilter = null) {
            try {
                let query = supabase
                    .from('tickets')
                    .select('*')
                    .order('date_opening', { ascending: false });

                if (instanceFilter && instanceFilter.length > 0) {
                    query = query.in('instance', instanceFilter.map(i => i.toUpperCase()));
                }

                const { data, error } = await query;

                if (error) {
                    console.error('[Supabase] Erro ao buscar tickets:', error);
                    return null;
                }

                return data || [];
            } catch (err) {
                console.error('[Supabase] Erro ao buscar tickets:', err);
                return null;
            }
        }

        async function getLastSyncTime() {
            try {
                const { data, error } = await sbClient
                    .from('tickets')
                    .select('updated_at')
                    .order('updated_at', { ascending: false })
                    .limit(1);
                
                if (error) return null;
                return data && data.length > 0 ? data[0].updated_at : null;
            } catch {
                return null;
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('sunIcon').style.display = 'block';
                document.getElementById('moonIcon').style.display = 'none';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        function toggleInstanceDropdown() {
            const container = document.getElementById('instanceDropdownContainer');
            const isOpen = container.classList.contains('open');
            
            if (isOpen) {
                container.classList.remove('open');
            } else {
                container.classList.add('open');
            }
            
            document.addEventListener('click', closeInstanceDropdownOnClickOutside);
        }

        function closeInstanceDropdownOnClickOutside(e) {
            const container = document.getElementById('instanceDropdownContainer');
            if (!container.contains(e.target)) {
                container.classList.remove('open');
                document.removeEventListener('click', closeInstanceDropdownOnClickOutside);
            }
        }

        function updateInstanceSelection() {
            const checkPeta = document.getElementById('checkPeta');
            const checkGmx = document.getElementById('checkGmx');
            const label = document.getElementById('instanceDropdownLabel');
            
            const petaSelected = checkPeta.checked;
            const gmxSelected = checkGmx.checked;
            
            selectedInstances = [];
            if (petaSelected) selectedInstances.push('Peta');
            if (gmxSelected) selectedInstances.push('GMX');
            
            if (petaSelected && gmxSelected) {
                label.textContent = 'Todas as instâncias';
            } else if (petaSelected) {
                label.textContent = 'Peta';
            } else if (gmxSelected) {
                label.textContent = 'GMX';
            } else {
                label.textContent = 'Nenhuma selecionada';
                selectedInstances = ['Peta', 'GMX'];
                checkPeta.checked = true;
                checkGmx.checked = true;
            }
            
            if (tickets.length > 0) {
                renderKanban(tickets);
            }

        function initInstanceDropdown() {
            const checkPeta = document.getElementById('checkPeta');
            const checkGmx = document.getElementById('checkGmx');
            
            if (!checkPeta || !checkGmx) {
                // Elementos ainda não renderizados, adiar
                setTimeout(initInstanceDropdown, 100);
                return;
            }
            
            checkPeta.checked = selectedInstances.includes('Peta');
            checkGmx.checked = selectedInstances.includes('GMX');
            updateInstanceSelection();
        }

        // Estado da aplicação
        let sessionTokens = {};
        let tickets = [];
        let ticketsByStatus = {};
        let isLoading = false;
        let currentView = 'all';
        let selectedInstances = ['Peta', 'GMX'];
        let loadedCounts = { processing: 100, pending: 100, solved: 100, closed: 100 };
        const INITIAL_LOAD = 100;
        const LOAD_MORE = 50;

        // Intervalo de atualização automática (10 minutos = 600000ms)
        const REFRESH_INTERVAL = 600000;
        let refreshTimer = null;
        let countdownTimer = null;
        let nextRefreshTime = null;

        // Função para atualizar o contador regressivo
        function updateCountdown() {
            if (!nextRefreshTime) return;
            
            const now = Date.now();
            const remaining = Math.max(0, nextRefreshTime - now);
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            const countdownEl = document.getElementById('refreshCountdown');
            if (countdownEl) {
                countdownEl.textContent = `Próximo refresh: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // Função para iniciar o contador regressivo
        function startCountdown() {
            nextRefreshTime = Date.now() + REFRESH_INTERVAL;
            updateCountdown();
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(updateCountdown, 1000);
        }

        // Função para alternar entre visualizações
        function setView(view) {
            currentView = view;
            
            // Atualizar botões
            document.getElementById('btnAll').classList.toggle('active', view === 'all');
            document.getElementById('btnActive').classList.toggle('active', view === 'active');
            
            // Atualizar indicador
            const indicator = document.getElementById('viewIndicator');
            if (view === 'active') {
                indicator.style.display = 'inline-block';
                indicator.textContent = 'Em atendimento + Pendente';
                indicator.className = 'view-indicator';
            } else {
                indicator.style.display = 'none';

            renderKanban(tickets);

        // Função para iniciar sessão na API - tenta diferentes endpoints
        async function initSession() {
            let lastError = null;
            
            for (const baseUrl of API_ENDPOINTS) {
                try {
                    console.log(`Tentando autenticar em: ${baseUrl}`);
                    
                    const response = await fetch(`${baseUrl}/initSession`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `user_token ${API_CONFIG.USER_TOKEN}`,
                            'App-Token': API_CONFIG.APP_TOKEN,
                        },
                    });

                    if (response.ok) {
                        const data = await response.json();
                        sessionToken = data.session_token;
                        API_CONFIG.BASE_URL = baseUrl; // Usar o endpoint que funcionou
                        console.log('Autenticação bem-sucedida!');
                        return sessionToken;
                    }
                    
                    const errorText = await response.text();
                    console.log(`Endpoint ${baseUrl} retornou ${response.status}: ${errorText}`);
                    lastError = new Error(`Erro ${response.status} em ${baseUrl}`);
                    
                } catch (error) {
                    console.log(`Endpoint ${baseUrl} falhou:`, error.message);
                    lastError = error;
                }
            }
            
            // Se nenhum endpoint funcionou, lançar erro detalhado
            console.error('Falha na autenticação em todos os endpoints:', lastError);
            throw lastError || new Error('Falha na autenticação');
        }

        // Função para encerrar sessão
        async function killSession() {
            for (const instanceName of Object.keys(INSTANCES)) {
                if (sessionTokens[instanceName]) {
                    try {
                        await fetch(`${INSTANCES[instanceName].BASE_URL}/killSession/`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': INSTANCES[instanceName].APP_TOKEN,
                            },
                        });
                    } catch (error) {
                        console.error(`Erro ao encerrar sessão ${instanceName}:`, error);
                    }
                }
            }
            sessionTokens = {};
        }

        // Função para iniciar sessão em uma instância
        async function initSession(instanceName) {
            const instance = INSTANCES[instanceName];
            console.log(`[GLPI] Iniciando sessão em ${instanceName}...`);
            console.log(`[GLPI] URL: ${instance.BASE_URL}`);
            console.log(`[GLPI] User Token: ${instance.USER_TOKEN ? 'definido' : 'NÃO DEFINIDO'}`);
            console.log(`[GLPI] App Token: ${instance.APP_TOKEN ? 'definido' : 'NÃO DEFINIDO'}`);
            
            try {
                const response = await fetch(`${instance.BASE_URL}/initSession`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `user_token ${instance.USER_TOKEN}`,
                        'App-Token': instance.APP_TOKEN,
                    },
                });

                console.log(`[GLPI] Resposta: ${response.status} ${response.statusText}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error(`[GLPI] Erro detalhado:`, errorText);
                    throw new Error(`Erro ao iniciar sessão em ${instanceName}: ${response.status} - ${errorText}`);
                }

                const data = await response.json();
                console.log(`[GLPI] Sessão iniciada com sucesso para ${instanceName}`);
                sessionTokens[instanceName] = data.session_token;
                return data.session_token;
            } catch (error) {
                console.error(`[GLPI] Erro na autenticação ${instanceName}:`, error);
                throw error;
            }
        }

        // Função para buscar tickets de uma instância
        async function getTicketsFromInstance(instanceName, retryCount = 0) {
            const instance = INSTANCES[instanceName];
            
            if (!sessionTokens[instanceName]) {
                await initSession(instanceName);
            }

            try {
                const allTickets = [];
                let page = 0;
                const pageSize = 100;
                let hasMore = true;
                let consecutiveErrors = 0;

                while (hasMore) {
                    const start = page * pageSize;
                    const end = start + pageSize - 1;

                    const searchParams = new URLSearchParams({
                        'range': `${start}-${end}`,
                        'expand_dropdowns': 'true',
                        'get_hateoas': 'false',
                    });

                    const response = await fetch(
                        `${instance.BASE_URL}/search/Ticket?${searchParams.toString()}`,
                        {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                                'Session-Token': sessionTokens[instanceName],
                                'App-Token': instance.APP_TOKEN,
                            },
                        }
                    );

                    if (!response.ok) {
                        consecutiveErrors++;
                        console.error(`[GLPI] Erro na requisição: ${response.status} ${response.statusText}`);
                        if (response.status === 401 && retryCount < 2) {
                            console.log(`🔄 Sessão expirada para ${instanceName}, reautenticando...`);
                            sessionTokens[instanceName] = null;
                            await initSession(instanceName);
                            return getTicketsFromInstance(instanceName, retryCount + 1);
                        }
                        throw new Error(`Erro ao buscar tickets de ${instanceName}: ${response.status}`);
                    }

                    consecutiveErrors = 0;
                    const data = await response.json();
                    
                    if (data.data) {
                        const ticketsArray = Array.isArray(data.data) ? data.data : Object.values(data.data);
                        
                        if (ticketsArray.length === 0) {
                            hasMore = false;
                        } else {
                            allTickets.push(...ticketsArray);
                            page++;
                            
                            if (ticketsArray.length < pageSize || page >= 50) {
                                hasMore = false;
                            }
                        }
                    } else {
                        hasMore = false;
                    }
                }

                return processTickets(allTickets, instanceName);
            } catch (error) {
                console.error(`Erro ao buscar tickets de ${instanceName}:`, error);
                throw error;
            }
        }

        // Função para buscar tickets de todas as instâncias
        async function getAllTickets() {
            const allTickets = [];
            const errors = [];
            
            for (const instanceName of selectedInstances) {
                try {
                    await initSession(instanceName);
                    const instanceTickets = await getTicketsFromInstance(instanceName);
                    allTickets.push(...instanceTickets);
                    console.log(`✅ ${instanceName}: ${instanceTickets.length} tickets carregados`);
                } catch (error) {
                    console.error(`❌ Falha ao carregar tickets de ${instanceName}:`, error);
                    errors.push({ instance: instanceName, error: error.message });
                }
            }
            
            if (allTickets.length === 0 && errors.length > 0) {
                throw new Error(`Falha ao carregar tickets: ${errors.map(e => e.instance).join(', ')}`);
            }
            
            console.log(`📊 Total de tickets carregados: ${allTickets.length}`);
            return allTickets;
        }

        // Função para processar tickets da API
        function getRootCategory(category) {
            if (!category) return 'Não categorizado';
            const parts = category.split(' > ');
            return parts[0].trim();
        }

        function getLastCategory(category) {
            if (!category) return 'Não categorizado';
            const parts = category.split(' > ');
            return parts[parts.length - 1].trim();
        }

        function isSlaExceeded(dueDateStr) {
            if (!dueDateStr) return false;
            const dueDate = new Date(dueDateStr);
            const now = new Date();
            return dueDate < now;
        }

        function processTickets(rawTickets, instanceName) {
            return rawTickets.map(ticket => {
                const statusId = parseInt(ticket[12]) || 1;
                const statusInfo = TICKET_STATUS[statusId] || TICKET_STATUS[1];
                
                let category = ticket[7] || 'Não categorizado';

                const dueDate = ticket[151] || ticket.due_date;
                const isSlaLate = isSlaExceeded(dueDate);

                return {
                    id: ticket[2] || ticket.id,
                    title: ticket[1] || 'Sem título',
                    entity: ticket[80] || 'Entidade não definida',
                    category: category,
                    rootCategory: getRootCategory(category),
                    group: lastGroupLabel(ticket[8] || 'Não atribuído'),
                    statusId: statusId,
                    status: statusInfo.key,
                    statusName: statusInfo.name,
                    statusColor: statusInfo.color,
                    dateCreated: ticket[15] || ticket.date_creation,
                    dueDate: dueDate,
                    isSlaLate: isSlaLate,
                    timePending: statusInfo.key === 'pending' ? calculatePendingTime(ticket) : null,
                    instance: instanceName,
                    instanceUrl: INSTANCES[instanceName].TICKET_URL,
                };
            });
        }

        // Função para calcular tempo em pendência
        function calculatePendingTime(ticket) {
            const lastUpdate = ticket[91] || ticket.date_creation;
            if (!lastUpdate) return null;

            const updateDate = new Date(lastUpdate);
            const now = new Date();
            const diffMs = now - updateDate;

            return formatDuration(diffMs);
        }

        // Função para formatar duração
        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) {
                const remainingHours = hours % 24;
                if (remainingHours > 0) {
                    return `há ${days} dia${days > 1 ? 's' : ''} e ${remainingHours} hora${remainingHours > 1 ? 's' : ''}`;
                }
                return `há ${days} dia${days > 1 ? 's' : ''}`;
            }
            
            if (hours > 0) {
                return `há ${hours} hora${hours > 1 ? 's' : ''}`;
            }
            
            if (minutes > 0) {
                return `há ${minutes} minuto${minutes > 1 ? 's' : ''}`;
            }
            
            return 'há poucos segundos';
        }

        // Função para formatar data
        function formatShortDate(dateString) {
            if (!dateString) return 'N/A';
            
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'N/A';
                
                return date.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                });
            } catch {
                return 'N/A';
            }
        }

        function getInstanceStats(tickets, instanceName) {
            // Filter case-insensitive to handle 'Peta' and 'PETA'
            const instanceTickets = tickets.filter(t => t.instance?.toLowerCase() === instanceName.toLowerCase());
            
            // Support both status (key) and status_key from Supabase
            const getStatus = (t) => t.status || t.status_key || 'new';
            
            return {
                total: instanceTickets.length,
                new: instanceTickets.filter(t => getStatus(t) === 'new').length,
                processing: instanceTickets.filter(t => getStatus(t) === 'processing').length,
                pending: instanceTickets.filter(t => getStatus(t) === 'pending').length,
                solved: instanceTickets.filter(t => getStatus(t) === 'solved').length,
                closed: instanceTickets.filter(t => getStatus(t) === 'closed').length,
                tickets: instanceTickets
            };
        }

        function getAvgPendingTime(tickets) {
            const pending = tickets.filter(t => t.status === 'pending');
            if (pending.length === 0) return { time: 'N/A', class: '', count: 0 };
            
            let totalMs = 0;
            let count = 0;
            pending.forEach(t => {
                if (t.dateCreated) {
                    totalMs += (new Date() - new Date(t.dateCreated));
                    count++;
                }
            });
            
            if (count === 0) return { time: 'N/A', class: '', count: pending.length };
            
            const avgMs = totalMs / count;
            const days = Math.floor(avgMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((avgMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            let timeStr, timeClass;
            if (days > 2) {
                timeStr = days > 0 ? `${days}d ${hours}h` : `${hours}h`;
                timeClass = 'danger';
            } else if (days > 0 || hours > 24) {
                timeStr = days > 0 ? `${days}d ${hours}h` : `${hours}h`;
                timeClass = 'warning';
            } else {
                timeStr = `${hours}h`;
                timeClass = '';
            }
            
            return { time: timeStr, class: timeClass, count: pending.length };
        }

        function getTicketsByPeriod(tickets, days) {
            const now = new Date();
            const startDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
            return tickets.filter(t => {
                if (!t.dateCreated) return false;
                const created = new Date(t.dateCreated);
                return created >= startDate;
            });
        }

        function getTicketsClosedInPeriod(tickets, days) {
            const now = new Date();
            const startDate = new Date(now.getTime() - (days * 24 * 60 * 60 * 1000));
            return tickets.filter(t => {
                if (t.status !== 'closed' && t.status !== 'solved') return false;
                if (!t.dateCreated) return false;
                const created = new Date(t.dateCreated);
                return created >= startDate;
            });
        }

        function renderSlaSection(slaOverdue) {
            const petaCount = slaOverdue.filter(t => t.instance?.toLowerCase() === 'peta').length;
            const gmxCount = slaOverdue.filter(t => t.instance?.toLowerCase() === 'gmx').length;
            const pendingCount = slaOverdue.filter(t => t.status === 'pending').length;
            const processingCount = slaOverdue.filter(t => t.status === 'processing').length;
            
            let tableHtml = '';
            if (slaOverdue.length > 0) {
                const rows = slaOverdue.slice(0, 15).map(ticket => {
                    const overdueDays = ticket.dueDate ? Math.floor((new Date() - new Date(ticket.dueDate)) / (1000 * 60 * 60 * 24)) : 0;
                    const statusClass = ticket.status === 'pending' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700';
                    return '<tr class="border-t hover:bg-gray-50">' +
                        '<td class="px-3 py-2"><a href="' + ticket.instanceUrl + ticket.id + '" target="_blank" class="text-blue-600 hover:underline">#' + ticket.id + '</a></td>' +
                        '<td class="px-3 py-2 max-w-xs truncate">' + (ticket.title || '') + '</td>' +
                        '<td class="px-3 py-2 text-gray-600">' + (ticket.entity || '-') + '</td>' +
                        '<td class="px-3 py-2"><span class="px-2 py-1 rounded text-xs font-medium ' + statusClass + '">' + (ticket.statusName || '') + '</span></td>' +
                        '<td class="px-3 py-2 text-red-600 font-medium">' + overdueDays + 'd</td>' +
                    '</tr>';
                }).join('');
                
                tableHtml = '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>' +

                    '<th class="px-3 py-2 text-left font-medium text-gray-600">Título</th>' +

                tableHtml = '<div class="text-center py-8 text-gray-500">Nenhum ticket com SLA atrasado</div>';

            return '<div class="bg-white rounded-lg shadow p-6 mb-6">' +

        function renderEntityCards(ticketsByEntity) {
            const sorted = Object.entries(ticketsByEntity).sort((a, b) => b[1].total - a[1].total).slice(0, 12);
            return sorted.map(([entity, stats]) => 
                '<div class="border rounded-lg p-4 hover:shadow-md transition-shadow">' +

                '</div>'
            ).join('');
        }

        function renderGroupBars(ticketsByGroup) {
            const sorted = Object.entries(ticketsByGroup).sort((a, b) => b[1].total - a[1].total).slice(0, 15);
            const maxTotal = Math.max(...sorted.map(([, s]) => s.total), 1);
            return sorted.map(([group, stats]) => {
                const pct = (stats.total / maxTotal * 100);
                const barColor = (stats.peta > 0 && stats.gmx === 0) ? 'bg-blue-500' : ((stats.gmx > 0 && stats.peta === 0) ? 'bg-orange-500' : 'bg-gradient-to-r from-blue-500 to-orange-500');
                return '<div class="flex items-center gap-3">' +
                    '<div class="w-32 truncate text-sm font-medium text-gray-700">' + group + '</div>' +
                    '<div class="flex-1 h-6 bg-gray-100 rounded-full overflow-hidden">' +
                        '<div class="' + barColor + ' h-full rounded-full flex items-center justify-end pr-2" style="width: ' + pct + '%">' +
                            '<span class="text-xs font-bold text-white">' + stats.total + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<div class="w-16 text-xs text-gray-500 text-right"><span class="text-blue-600">' + stats.peta + '</span> · <span class="text-orange-600">' + stats.gmx + '</span></div>' +
                '</div>';
            }).join('');
        }

        function renderSolutionBars(ticketsBySolution) {
            const sorted = Object.entries(ticketsBySolution).sort((a, b) => b[1].total - a[1].total).slice(0, 15);

            return sorted.map(([rootCat, stats]) => {
                const pct = (stats.total / maxTotal * 100);
                const barColor = (stats.peta > 0 && stats.gmx === 0) ? 'bg-purple-500' : ((stats.gmx > 0 && stats.peta === 0) ? 'bg-green-500' : 'bg-gradient-to-r from-purple-500 to-green-500');

        function renderTailwindPeriodContent(tickets, days) {
            const periodTickets = getTicketsByPeriod(tickets, days);
            const closedTickets = getTicketsClosedInPeriod(tickets, days);
            const petaPeriod = periodTickets.filter(t => t.instance?.toLowerCase() === 'peta');
            const gmxPeriod = periodTickets.filter(t => t.instance?.toLowerCase() === 'gmx');
            const petaClosed = closedTickets.filter(t => t.instance?.toLowerCase() === 'peta');
            const gmxClosed = closedTickets.filter(t => t.instance?.toLowerCase() === 'gmx');
            
            const petaClosedCount = petaClosed.length;
            const gmxClosedCount = gmxClosed.length;
            const totalOpened = periodTickets.length;
            const totalClosed = closedTickets.length;
            const closureRate = totalOpened > 0 ? Math.round((totalClosed / totalOpened) * 100) : 0;
            
            return `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-gray-800">${totalOpened}</div>
                        <div class="text-sm text-gray-600">Abertos no Período</div>
                        <div class="text-xs mt-1 text-blue-600">Peta: ${petaPeriod.length}</div>
                        <div class="text-xs text-orange-600">GMX: ${gmxPeriod.length}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-green-600">${totalClosed}</div>
                        <div class="text-sm text-gray-600">Fechados no Período</div>
                        <div class="text-xs mt-1 text-blue-600">Peta: ${petaClosedCount}</div>
                        <div class="text-xs text-orange-600">GMX: ${gmxClosedCount}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-purple-600">${closureRate}%</div>
                        <div class="text-sm text-gray-600">Taxa de Fechamento</div>
                        <div class="text-xs mt-1 text-gray-500">Fechados / Abertos</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-blue-600">${Math.round(totalOpened * 30 / days)}</div>
                        <div class="text-sm text-gray-600">Média Mensal</div>
                        <div class="text-xs mt-1 text-gray-500">Tickets/mês</div>
                    </div>
                </div>
            `;
        }

        function updatePeriodFilter(btn, tickets) {
            document.querySelectorAll('.period-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-gray-200', 'text-gray-700');
            });
            btn.classList.remove('bg-gray-200', 'text-gray-700');
            btn.classList.add('bg-blue-600', 'text-white');
            
            const days = btn.dataset.period;
            const contentDiv = document.getElementById('periodContent');
            
            if (days === 'total') {
                // Show all tickets (no date filter)
                const totalOpened = tickets.length;
                const closedTickets = tickets.filter(t => t.status === 'closed' || t.status === 'solved');
                const totalClosed = closedTickets.length;
                const petaCount = tickets.filter(t => t.instance?.toLowerCase() === 'peta').length;
                const gmxCount = tickets.filter(t => t.instance?.toLowerCase() === 'gmx').length;
                const petaClosed = closedTickets.filter(t => t.instance?.toLowerCase() === 'peta').length;
                const gmxClosed = closedTickets.filter(t => t.instance?.toLowerCase() === 'gmx').length;
                const closureRate = totalOpened > 0 ? Math.round((totalClosed / totalOpened) * 100) : 0;
                
                contentDiv.innerHTML = renderTailwindPeriodContentAll(totalOpened, totalClosed, petaCount, gmxCount, petaClosed, gmxClosed, closureRate);
            } else {
                const daysNum = parseInt(days);
                contentDiv.innerHTML = renderTailwindPeriodContent(tickets, daysNum);
            }
        }

            return `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-gray-800">${totalOpened}</div>
                        <div class="text-sm text-gray-600">Total de Tickets</div>
                        <div class="text-xs mt-1 text-blue-600">Peta: ${petaCount}</div>
                        <div class="text-xs text-orange-600">GMX: ${gmxCount}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-3xl font-bold text-green-600">${totalClosed}</div>
                        <div class="text-sm text-gray-600">Fechados/Solucionados</div>
                        <div class="text-xs mt-1 text-blue-600">Peta: ${petaClosed}</div>
                        <div class="text-xs text-orange-600">GMX: ${gmxClosed}</div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-4 text-center">

                    </div>
                </div>
            `;
        }

        function renderKanban(tickets) {
            const mainContent = document.getElementById('mainContent');
            console.log(`renderKanban received: ${tickets.length} tickets`);
            
            // Store tickets globally for filter functions
            window.currentTickets = tickets;
            
            mainContent.innerHTML = renderFullDashboard(tickets);
            console.log(`Dashboard rendered, innerHTML length: ${mainContent.innerHTML.length}`);
        }

        // Função para renderizar card de ticket
        function renderTicketCard(ticket, isFiltered = false) {
            let pendingHTML = '';
            if (ticket.status === 'pending' && ticket.timePending) {
                pendingHTML = `
                    <div class="pending-time">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        ${ticket.timePending}
                    </div>
                `;
            }
            
            const priorityInfo = ticket.priority_id ? (TICKET_PRIORITY[ticket.priority_id] || TICKET_PRIORITY[1]) : TICKET_PRIORITY[1];
            const isUrgent = priorityInfo.key === 'urgent' || priorityInfo.key === 'critical';
            const urgentClass = isFiltered || isUrgent ? 'urgent' : '';
            const instanceClass = ticket.instance ? ticket.instance.toLowerCase() : '';
            const cardClass = `ticket-card ${ticket.status} ${urgentClass}`.trim();

            return `
                <div class="${cardClass}">
                    <div class="ticket-header">
                        <span class="ticket-id">
                            <a href="${ticket.instanceUrl}${ticket.id}" target="_blank" title="${ticket.title}">
                                #${ticket.id}
                            </a>
                        </span>
                        <span class="instance-badge ${instanceClass}">${ticket.instance}</span>
                    </div>
                    <div class="ticket-status-row" style="display: flex; gap: 6px; align-items: center; margin-bottom: 6px;">
                        <span class="status-badge ${ticket.status}">${getStatusIcon(ticket.status)}${ticket.statusName}</span>
                        ${ticket.priority ? `<span class="priority-badge ${priorityInfo.key}">${getPriorityIcon()}${priorityInfo.label}</span>` : ''}
                    </div>
                    
                    <div class="ticket-entity-mini" title="${ticket.entity}">${ticket.entity}</div>
                    
                    <div class="ticket-category" title="${ticket.title}">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        ${ticket.category}
                    </div>
                    
                    <div class="ticket-dates">
                        <div class="ticket-date-row">
                            <span class="ticket-date-label">Abertura:</span>
                            <span class="ticket-date-value">${formatShortDate(ticket.dateCreated)}</span>
                        </div>
                        <div class="ticket-date-row">
                            <span class="ticket-date-label">Previsto:</span>
                            <span class="ticket-date-value">${formatShortDate(ticket.dueDate)}</span>
                        </div>
                    </div>
                    
                    ${pendingHTML}
                </div>
            `;
        }

        // ========== SISTEMA DE CACHE ==========
        const CACHE_KEY = 'central_tickets_cache';
        const CACHE_TIMESTAMP_KEY = 'central_tickets_cache_timestamp';

        function saveCache() {
            try {
                const cacheData = {
                    tickets: tickets,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
                localStorage.setItem(CACHE_TIMESTAMP_KEY, new Date().toISOString());
                console.log('💾 Cache salvo com sucesso');
                return true;
            } catch (error) {
                console.error('❌ Erro ao salvar cache:', error);
                return false;
            }
        }

        function loadCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const cacheData = JSON.parse(cached);
                    console.log('📂 Cache carregado de:', new Date(cacheData.timestamp).toLocaleString('pt-BR'));
                    return cacheData.tickets;
                }
            } catch (error) {
                console.error('❌ Erro ao carregar cache:', error);
            }
            return null;
        }

        function getCacheTimestamp() {
            return localStorage.getItem(CACHE_TIMESTAMP_KEY);
        }

        function clearCache() {
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_TIMESTAMP_KEY);
            console.log('🗑️ Cache limpo');
        }

        function exportToJSON() {
            if (tickets.length === 0) {
                alert('Nenhum ticket para exportar. Carregue os dados primeiro.');
                return;
            }

            const exportData = {
                exportedAt: new Date().toISOString(),
                totalTickets: tickets.length,
                instances: {
                    peta: tickets.filter(t => t.instance?.toLowerCase() === 'peta').length,
                    gmx: tickets.filter(t => t.instance?.toLowerCase() === 'gmx').length
                },
                tickets: tickets
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `tickets_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            console.log('📤 Exportação concluída');
        }

        function importFromJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        
                        if (importedData.tickets && Array.isArray(importedData.tickets)) {
                            if (confirm(`Importar ${importedData.tickets.length} tickets de ${importedData.exportedAt ? new Date(importedData.exportedAt).toLocaleDateString('pt-BR') : 'data desconhecida'}?\n\nIsso substituirá os dados atuais.`)) {
                                tickets = importedData.tickets;
                                saveCache();
                                loadedCounts = { processing: INITIAL_LOAD, pending: INITIAL_LOAD, solved: INITIAL_LOAD, closed: INITIAL_LOAD };
                                renderKanban(tickets);
                                alert(`✅ ${tickets.length} tickets importados com sucesso!`);
                            }
                        } else {
                            alert('❌ Arquivo JSON inválido. Verifique o formato.');
                        }
                    } catch (error) {
                        alert('❌ Erro ao ler arquivo: ' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

// Função para atualizar tickets com carregamento otimizado
        async function refreshTickets() {
            if (isLoading) return;
            isLoading = true;

            const refreshBtn = document.getElementById('refreshBtn');
            const syncBtn = document.getElementById('syncBtn');
            if (refreshBtn) refreshBtn.disabled = true;
            if (syncBtn) syncBtn.disabled = true;

            try {
                console.log('[Supabase] Iniciando carregamento completo de tickets...');

                let allTickets = [];
                let page = 0;
                const pageSize = 2000;
                let hasMore = true;

                while (hasMore) {
                    const from = page * pageSize;
                    const to = from + pageSize - 1;

                    const { data, error } = await window._sb
                        .from('tickets_cache')
                        .select('*')
                        .order('date_mod', { ascending: false })
                        .range(from, to);

                    if (error) throw new Error(`Erro na página ${page}: ${error.message}`);

                    if (!data || data.length === 0) {
                        hasMore = false;
                    } else {
                        allTickets = [...allTickets, ...data];
                        page++;
                        console.log(`[Supabase] Página ${page} → Total: ${allTickets.length}`);
                        
                        showLoading(`Carregando tickets... ${allTickets.length} registros`);
                    }
                }

                console.log(`[Supabase] Total carregado do Supabase: ${allTickets.length}`);

                // Mapear para formato do dashboard
                tickets = allTickets.map(t => ({
                    id: t.ticket_id,
                    title: t.title,
                    entity: t.entity,
                    entityFull: t.entity_full,
                    category: t.category,
                    rootCategory: t.root_category,
                    statusId: t.status_id,
                    status: t.status_key || 'new',
                    statusName: t.status_name,
                    priorityId: t.priority_id || 1,
                    priority: t.priority || '1-Baixa',
                    group: lastGroupLabel(t.group_name || ''),
                    groupFull: t.group_name,
                    technician: t.technician || '',
                    dateCreated: t.date_created,
                    lastUpdate: t.date_mod,
                    dueDate: t.due_date,
                    isSlaLate: t.is_sla_late || false,
                    isOverdueFirst: t.is_overdue_first || false,
                    isOverdueResolve: t.is_overdue_resolve || false,
                    timeToOwn: t.time_to_own,
                    timeToResolve: t.time_to_resolve,
                    instance: t.instance,
                    instanceUrl: t.instance?.toLowerCase() === 'peta' 
                        ? (window.APP_CONFIG?.GLPI_PETA_TICKET_URL || '') 
                        : (window.APP_CONFIG?.GLPI_GMX_TICKET_URL || ''),
                }));

                // Salvar apenas metadata no cache (não os tickets completos para evitar quota)
                try {
                    const cacheMeta = {
                        count: tickets.length,
                        timestamp: new Date().toISOString(),
                        lastId: tickets.length > 0 ? tickets[0].id : null
                    };
                    localStorage.setItem(CACHE_TIMESTAMP_KEY, JSON.stringify(cacheMeta));
                } catch (e) {
                    console.warn('Não foi possível salvar metadata do cache:', e);
                }

                console.log(`[Supabase] Finalizado: ${tickets.length} tickets`);

                window.currentTickets = tickets;
                renderKanban(tickets);

                // Atualizar UI
                const lastUpdateEl = document.getElementById('lastUpdate');
                if (lastUpdateEl) lastUpdateEl.textContent = `Atualizado: ${getCurrentTimeFormatted()}`;
                startCountdown();

                console.log(`✅ Carregamento concluído: ${tickets.length} tickets`);
            } catch (error) {
                console.error('[Supabase] Erro ao carregar tickets:', error);
                showError('Falha ao carregar tickets', 'Verifique a conexão e tente novamente.', error);
            } finally {
                isLoading = false;
                if (refreshBtn) refreshBtn.disabled = false;
                if (syncBtn) syncBtn.disabled = false;
            }
        }

        async function syncToSupabase() {
            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) {
                syncBtn.disabled = true;
                syncBtn.style.opacity = '0.5';
            }
            
            try {
                console.log('🔄 Sincronizando com Supabase...');
                
                for (const instanceName of selectedInstances) {
                    const instanceTickets = tickets.filter(t => t.instance === instanceName);
                    if (instanceTickets.length > 0) {
                        await syncTicketsToSupabase(instanceTickets, instanceName);
                    }
                }
                
                console.log('✅ Sincronização com Supabase concluída');
            } catch (error) {
                console.error('❌ Erro na sincronização:', error);
            } finally {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.style.opacity = '1';
                }
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            // Inicializar Supabase cache
            const supabaseUrl = window.APP_CONFIG?.SUPABASE_URL || '';
            const supabaseKey = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
            if (supabaseUrl && supabaseKey) {
                SupabaseCache.init(supabaseUrl, supabaseKey);
                console.log('✅ Supabase Cache inicializado');
            }

            initTheme();
            initInstanceDropdown();
            
            // First sync from GLPI to Supabase cache
            if (typeof syncToSupabase === 'function') {
                syncToSupabase();
            }
            
            // Then load and display tickets
            setTimeout(() => {
                refreshTickets();
            }, 500);

            // Configurar atualização automática (apenas dados, sem recarregar página)
            refreshTimer = setInterval(() => {
                console.log('🔄 Atualizando dados automaticamente...');
                refreshTickets();
            }, REFRESH_INTERVAL);
            startCountdown();
        });

        // Cleanup ao sair da página
        window.addEventListener('beforeunload', () => {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
            killSession();
        });

        // Helper: extract last segment of group label
        function lastGroupLabel(name) {
            if (!name) return '';
            const parts = String(name).split('>');
            return parts[parts.length - 1].trim();
        }
    </script>
</body>
</html>
