<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Tickets - Relatórios</title>
    <link rel="icon" href="favicon-peta.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --background: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --status-processing: #22c55e;
            --status-pending: #f97316;
            --status-approval: #8b5cf6;
            --status-solved: #6b7280;
            --status-closed: #1f2937;
            --status-new: #3b82f6;
            --sla-ok: #10b981;
            --sla-late: #ef4444;
            --radius-sm: 6px;
            --radius-md: 8px;
        }

        [data-theme="dark"] {
            --background: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            flex-shrink: 0;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .nav-link svg {
            width: 18px;
            height: 18px;
        }

        .header-nav {
            display: flex;
            gap: 8px;
        }

        .main {
            max-width: 1800px;
            margin: 0 auto;
            padding: 24px;
        }

        .filters-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 24px;
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filters-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filters-title svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .filter-select {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: var(--surface);
            color: var(--text-primary);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--background);
        }

        .results-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .results-count {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .table-container {
            overflow-x: auto;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead {
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--background);
        }

        .col-id {
            font-weight: 600;
            color: var(--primary);
        }

        .col-instance {
            width: 80px;
        }

        .instance-badge {
            display: inline-flex;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 700;
        }

        .instance-badge.peta {
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
        }

        .instance-badge.gmx {
            background: rgba(234, 88, 12, 0.12);
            color: #c2410c;
        }

.col-entity, .col-category, .col-group {
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
table { table-layout: fixed; width: 100%; }
th, td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-badge.new { background: rgba(59, 130, 246, 0.12); color: #2563eb; }
        .status-badge.processing, .status-badge.em-atendimento { background: rgba(34, 197, 94, 0.12); color: #16a34a; }
        .status-badge.pending { background: rgba(249, 115, 22, 0.12); color: #f97316; }
        .status-badge.pending-approval, .status-badge.aprovacao { background: rgba(139, 92, 246, 0.25); color: #7c3aed; }
        .status-badge.solved { background: rgba(107, 114, 128, 0.20); color: #6b7280; }
        .status-badge.closed { background: rgba(0, 0, 0, 0.12); color: #000000; }

        .sla-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .sla-badge.sla-ok { background: rgba(16, 185, 129, 0.12); color: #059669; }
        .sla-badge.sla-late { background: rgba(239, 68, 68, 0.12); color: #dc2626; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-actions {
            display: flex;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--border);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-nav {
                width: 100%;
                flex-wrap: wrap;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .filter-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

                </button>

        <main class="main">

                <div class="filters-header">

                            <option value="8">Agosto</option>

                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Instância</label>

                    </div>
                    <div class="filter-group">

                    <div class="filter-group">

    <script>
        const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || '';
        const SUPABASE_ANON_KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY || '';
        const sbClient = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY));

        const INSTANCES = {
            'Peta': {
                BASE_URL: window.APP_CONFIG?.GLPI_PETA_URL || '',
                USER_TOKEN: window.APP_CONFIG?.GLPI_PETA_USER_TOKEN || '',
                APP_TOKEN: window.APP_CONFIG?.GLPI_PETA_APP_TOKEN || '',
            },
            'GMX': {
                BASE_URL: window.APP_CONFIG?.GLPI_GMX_URL || '',
                USER_TOKEN: window.APP_CONFIG?.GLPI_GMX_USER_TOKEN || '',
                APP_TOKEN: window.APP_CONFIG?.GLPI_GMX_APP_TOKEN || '',
            }
        };

        const STATUS_CONFIG = {
            1: { name: 'Novo', key: 'new' },
            2: { name: 'Em atendimento', key: 'processing' },
            3: { name: 'Processando', key: 'processing' },
            4: { name: 'Pendente', key: 'pending' },
            5: { name: 'Solucionado', key: 'solved' },
            6: { name: 'Fechado', key: 'closed' },
            7: { name: 'Aguardando aprovação', key: 'approval' },
        };

        const MONTHS = [
            'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
            'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
        ];

        let sessionTokens = {};
        let allTickets = [];
        let filteredTickets = [];
        let isLoading = false;

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('sunIcon').style.display = 'block';
                document.getElementById('moonIcon').style.display = 'none';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('sunIcon').style.display = 'none';
                document.getElementById('moonIcon').style.display = 'block';
            }
        }

        async function initSession(instanceName) {
            const instance = INSTANCES[instanceName];
            try {
                const response = await fetch(`${instance.BASE_URL}/initSession`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `user_token ${instance.USER_TOKEN}`,
                        'App-Token': instance.APP_TOKEN,
                    },
                });
                if (!response.ok) throw new Error(`Erro ao iniciar sessão em ${instanceName}`);
                const data = await response.json();
                sessionTokens[instanceName] = data.session_token;
                return data.session_token;
            } catch (error) {
                console.error(`Erro na autenticação ${instanceName}:`, error);
                throw error;
            }
        }

        async function getTicketsFromInstance(instanceName) {
            try {
                const { data, error } = await window._sb
                    .from('tickets_cache')
                    .select('*')
                    .eq('instance', instanceName)
                    .order('date_created', { ascending: false })
                    .limit(1000);

                if (error) {
                    console.error(`Erro ao buscar tickets de ${instanceName} do Supabase:`, error);
                    return [];
                }

                console.log(`${instanceName}: ${(data || []).length} tickets carregados do Supabase`);
                
                // Fetch technician names from GLPI API
                const ticketsWithTechnicians = await fetchTechniciansFromGLPI(data || [], instanceName);
                
                return processTickets(ticketsWithTechnicians, instanceName);
            } catch (error) {
                console.error(`Erro ao buscar tickets de ${instanceName}:`, error);
                return [];
            }
        }

        // Fetch technician names from GLPI using Ticket_User API (type=2 for assigned)
        async function fetchTechniciansFromGLPI(tickets, instanceName) {
            if (!tickets || tickets.length === 0) return tickets;
            
            const ticketsWithCache = tickets.map(ticket => ({
                ...ticket,
                technician: ticket.technician || ''
            }));
            
            try {
                const sessionToken = await initGLPISessionRel(instanceName);
                const instance = INSTANCES[instanceName];
                
                for (let i = 0; i < ticketsWithCache.length; i++) {
                    const ticket = ticketsWithCache[i];
                    
                    if (ticket.technician) continue;
                    
                    try {
                        const response = await fetch(
                            `${instance.BASE_URL}/Ticket/${ticket.ticket_id}/Ticket_User`,
                            {
                                method: 'GET',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Session-Token': sessionToken,
                                    'App-Token': instance.APP_TOKEN,
                                },
                            }
                        );
                        
                        if (response.ok) {
                            const actors = await response.json();
                            const technician = actors?.find(a => a.type === 2);
                            
                            if (technician?.users_id) {
                                const userResponse = await fetch(
                                    `${instance.BASE_URL}/User/${technician.users_id}`,
                                    {
                                        method: 'GET',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'Session-Token': sessionToken,
                                            'App-Token': instance.APP_TOKEN,
                                        },
                                    }
                                );
                                
                                if (userResponse.ok) {
                                    const user = await userResponse.json();
                                    const name = [user.firstname, user.realname].filter(Boolean).join(' ') || user.name || technician.users_id.toString();
                                    ticketsWithCache[i].technician = name;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`Failed to fetch technician for ticket ${ticket.ticket_id}:`, e);
                    }
                }
            } catch (e) {
                console.error('Error fetching technicians from GLPI:', e);
            }
            
            return ticketsWithCache;
        }
        
        async function initGLPISessionRel(instanceName) {
            if (!sessionTokens[instanceName]) {
                await initSession(instanceName);
            }
            return sessionTokens[instanceName];
        }

        // Cache de nomes de usuários para evitar múltiplas chamadas
        const userNameCache = {};

        // Função para buscar nome de usuário pelo ID usando cache do Supabase
        async function getUserName(userId, instanceName) {
            if (!userId) return '';
            
            const cacheKey = `${instanceName}_${userId}`;
            if (userNameCache[cacheKey]) {
                return userNameCache[cacheKey];
            }

            try {
                // Try to get from Supabase user cache first
                const { data, error } = await window._sb
                    .from('user_cache')
                    .select('name')
                    .eq('instance', instanceName)
                    .eq('user_id', userId.toString())
                    .single();

                if (!error && data) {
                    userNameCache[cacheKey] = data.name;
                    return data.name;
                }
            } catch (error) {
                // Fallback - return ID as string
            }

            return userId.toString();
        }
                
                // Usar a API de busca para buscar usuário por ID
                const searchParams = new URLSearchParams({
                    'criteria[0][link]': 'AND',
                    'criteria[0][field]': '1', // ID field
                    'criteria[0][searchtype]': 'equals',
                    'criteria[0][value]': userId.toString(),
                    'range': '0-0',
                    'uid_cols': 'true',
                });

                const response = await fetch(
                    `${instance.BASE_URL}/search/User?${searchParams.toString()}`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Session-Token': sessionTokens[instanceName],
                            'App-Token': instance.APP_TOKEN,
                        },
                    }
                );

                if (!response.ok) return userId.toString();

                const data = await response.json();
                
                // O resultado vem com chaves como "User.name" ou "2" (id)
                // Primeiro tenta buscar pelo nome completo (campo 2 = name)
                // Campo 2 = Name, Campo 5 = Realname, Campo 1 = ID
                let userName = userId.toString();
                
                if (data.data && data.data[0]) {
                    // Tentar diferentes campos de nome
                    const userData = data.data[0];
                    if (userData['2']) {
                        userName = userData['2'].toString();
                    } else if (userData['User.name']) {
                        userName = userData['User.name'].toString();
                    } else if (userData['5']) {
                        // Tentar campo 5 (realname)
                        userName = userData['5'].toString();
                    }
                }
                
                userNameCache[cacheKey] = userName;
                return userName;
            } catch (error) {
                console.error(`Erro ao buscar usuário ${userId}:`, error);
                return userId.toString();
            }
        }

        // Função para buscar nomes de técnicos de uma lista de tickets
        async function resolveTechnicianNames(tickets, instanceName) {
            const userIds = new Set();
            
            // Coletar todos os IDs de usuários únicos
            tickets.forEach(ticket => {
                const assigned = ticket[4];
                if (assigned) {
                    if (Array.isArray(assigned)) {
                        assigned.forEach(id => userIds.add(id));
                    } else {
                        userIds.add(assigned);
                    }
                }
            });

            // Buscar nomes em paralelo para os IDs únicos
            await Promise.all(Array.from(userIds).map(userId => 
                getUserName(userId, instanceName)
            ));

            // Atualizar os tickets com nomes resolvidos
            return tickets.map(ticket => {
                const assigned = ticket[4];
                let technicianName = '';
                
                if (assigned) {
                    if (Array.isArray(assigned) && assigned.length > 0) {
                        technicianName = userNameCache[`${instanceName}_${assigned[0]}`] || assigned[0].toString();
                    } else {
                        technicianName = userNameCache[`${instanceName}_${assigned}`] || assigned.toString();
                    }
                }

                return {
                    ...ticket,
                    _technicianName: technicianName
                };
            });
        }

        // Função para extrair técnico do ticket
        // Campo 5 = requester (solicitante)
        // Campo 4 = assignee (atribuído) - pode ser array de IDs
        function getTechnicianFromTicket(ticket) {
            // Tentar campo 4 (atribuído) primeiro - pode ser array ou número
            const assigned = ticket[4];
            if (assigned) {
                if (Array.isArray(assigned) && assigned.length > 0) {
                    return assigned[0]; // Retorna primeiro usuário atribuído
                }
                return assigned.toString();
            }
            // Fallback para campo 5 (solicitante)
            return ticket[5] ? ticket[5].toString() : '';
        }

        function processTickets(rawTickets, instanceName) {
            return rawTickets.map(ticket => {
                const statusId = ticket.status_id || 1;
                const statusInfo = STATUS_CONFIG[statusId] || STATUS_CONFIG[1];
                const statusName = ticket.status_name || statusInfo.name || '';
                
                const entityFull = ticket.entity || '';
                let entityShort = entityFull;
                
                if (instanceName === 'Peta') {
                    entityShort = entityFull.replace(/^PETA GRUPO\s*>\s*/i, '').trim();
                } else if (instanceName === 'GMX') {
                    entityShort = entityFull.replace(/^GMX\s*TECNOLOGIA\s*>\s*/i, '').trim();
                }
                entityShort = entityShort || entityFull;

                const dateCreated = ticket.date_created;
                const lastUpdate = ticket.date_mod || dateCreated;

                // SLA
                const isSlaLate = ticket.is_sla_late || ticket.is_overdue_resolve || false;
                
                return {
                    id: ticket.ticket_id,
                    entity: entityShort,
                    category: ticket.category || 'Não categorizado',
                    status: ticket.status_key || statusInfo.key,
                    statusName: statusName,
                    group: lastGroupLabel(ticket.group_name || ''),
                    technician: ticket.technician || ticket._technicianName || '',
                    slaAtendimento: (ticket.is_overdue_first || false) ? 'Fora do prazo' : 'No prazo',
                    slaSolucao: isSlaLate ? 'Fora do prazo' : 'No prazo',
                    isSlaLate: isSlaLate,
                    isOverdueFirst: ticket.is_overdue_first || false,
                    isOverdueResolve: ticket.is_overdue_resolve || false,
                    timeToOwn: ticket.time_to_own,
                    timeToResolve: ticket.time_to_resolve,
                    dateCreated: dateCreated,
                    lastUpdate: lastUpdate,
                    instance: instanceName,
                    instanceUrl: ticket.instance === 'Peta' 
                        ? (window.APP_CONFIG?.GLPI_PETA_TICKET_URL || '')
                        : (window.APP_CONFIG?.GLPI_GMX_TICKET_URL || ''),
                };
            });
        }

        async function loadAllTickets() {
            if (isLoading) return;
            isLoading = true;
        
            const content = document.getElementById('resultsContent');
            content.innerHTML = `
                <div class="loading-overlay">
                    <div class="spinner"></div>
                    <p>Carregando tickets...</p>
                </div>
            `;
        
            try {
                allTickets = [];
                const BATCH_SIZE = 50; // Process tickets in batches for incremental rendering
                
                // Carregar PETA
                try {
                    const petaTickets = await getTicketsFromInstance('Peta');
                    console.log(`Peta: ${petaTickets.length} tickets brutos carregados`);
                    
                    // Process tickets in batches for incremental rendering
                    for (let i = 0; i < petaTickets.length; i += BATCH_SIZE) {
                        const batch = petaTickets.slice(i, i + BATCH_SIZE);
                        const resolvedBatch = await resolveTechnicianNames(batch, 'Peta');
                        allTickets.push(...resolvedBatch);
                        
                        // Update UI incrementally
                        if (window.renderResults && typeof window.renderResults === 'function') {
                            // Apply current filters to show partial results
                            window.applyFiltersToPartialResults(allTickets);
                        }
                    }
                } catch (error) {
                    console.error(`Falha ao carregar PETA:`, error);
                }
                
                // Carregar GMX
                try {
                    const gmxTickets = await getTicketsFromInstance('GMX');
                    console.log(`GMX: ${gmxTickets.length} tickets brutos carregados`);
                    
                    // Process tickets in batches for incremental rendering
                    for (let i = 0; i < gmxTickets.length; i += BATCH_SIZE) {
                        const batch = gmxTickets.slice(i, i + BATCH_SIZE);
                        const resolvedBatch = await resolveTechnicianNames(batch, 'GMX');
                        allTickets.push(...resolvedBatch);
                        
                        // Update UI incrementally
                        if (window.renderResults && typeof window.renderResults === 'function') {
                            // Apply current filters to show partial results
                            window.applyFiltersToPartialResults(allTickets);
                        }
                    }
                } catch (error) {
                    console.error(`Falha ao carregar GMX:`, error);
                }
                
                populateYearFilter();
                populateEntityFilter();
                console.log(`Total de tickets carregados: ${allTickets.length}`);
            } catch (error) {
                console.error('Erro ao carregar tickets:', error);
                content.innerHTML = `<div class="empty-state"><h3>Erro ao carregar dados</h3><p>${error.message}</p></div>`;
            } finally {
                isLoading = false;
            }
        }

        function populateYearFilter() {
            const yearSelect = document.getElementById('yearFilter');
            const years = new Set();
            
            allTickets.forEach(t => {
                const date = new Date(t.lastUpdate || t.dateCreated);
                if (!isNaN(date.getTime())) {
                    years.add(date.getFullYear());
                }
            });

            const sortedYears = Array.from(years).sort((a, b) => b - a);
            yearSelect.innerHTML = '<option value="">Todos os anos</option>';
            sortedYears.forEach(year => {
                yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
            });
        }

        function populateEntityFilter() {
            const entitySelect = document.getElementById('entityFilter');
            const entities = new Set();
            
            allTickets.forEach(t => {
                if (t.entity) entities.add(t.entity);
            });

            const sortedEntities = Array.from(entities).sort();
            entitySelect.innerHTML = '<option value="">Todas as entidades</option>';
            sortedEntities.forEach(entity => {
                entitySelect.innerHTML += `<option value="${entity}">${entity}</option>`;
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return '';
                return date.toLocaleDateString('pt-BR');
            } catch {
                return '';
            }
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return '';
                return date.toLocaleString('pt-BR');
            } catch {
                return '';
            }
        }

        // Função para aplicar filtros e renderizar resultados parciais (durante carregamento incremental)
        function applyFiltersToPartialResults(currentTickets) {
            // Apply current filters to show partial results
            const dateType = document.getElementById('dateTypeFilter').value;
            const year = document.getElementById('yearFilter').value;
            const month = document.getElementById('monthFilter').value;
            const instance = document.getElementById('instanceFilter').value;
            const entity = document.getElementById('entityFilter').value;
            const status = document.getElementById('statusFilter').value;

            if (!year && !month) {
                // If no date filter, show all
                filteredTickets = currentTickets;
                renderResults();
                return;
            }

            filteredTickets = currentTickets.filter(ticket => {
                const dateToCheck = dateType === 'opening' ? ticket.dateCreated : ticket.lastUpdate;
                if (!dateToCheck) return false;
                const date = new Date(dateToCheck);
                if (isNaN(date.getTime())) return false;

                if (year && date.getFullYear() !== parseInt(year)) return false;
                if (month && (date.getMonth() + 1) !== parseInt(month)) return false;
                if (instance && ticket.instance !== instance) return false;
                if (entity && ticket.entity !== entity) return false;
                if (status && ticket.status !== status) return false;

                return true;
            });

            renderResults();
        }

                if (instance && ticket.instance !== instance) return false;
                if (entity && ticket.entity !== entity) return false;
                if (status && ticket.status !== status) return false;

                return true;
            });

            renderResults();
        }

            filteredTickets = allTickets.filter(ticket => {

                if (!dateToCheck) return false;

                const date = new Date(dateToCheck);

        function renderResults() {
            const content = document.getElementById('resultsContent');
            const countEl = document.getElementById('resultsCount');
            const exportBtn = document.getElementById('exportBtn');
            const exportBtnTop = document.getElementById('exportBtnTop');

            countEl.textContent = `(${filteredTickets.length} registros)`;
            exportBtn.disabled = filteredTickets.length === 0;
            exportBtnTop.disabled = filteredTickets.length === 0;

            if (filteredTickets.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <h3>Nenhum resultado encontrado</h3>
                        <p>Tente ajustar os filtros para encontrar mais resultados.</p>
                    </div>
                `;
                return;
            }

            const rows = filteredTickets.map(t => `
                <tr>
                    <td class="col-id">#${t.id}</td>
                    <td class="col-instance"><span class="instance-badge ${t.instance.toLowerCase()}">${t.instance}</span></td>
                    <td class="col-entity" title="${t.entity}">${t.entity}</td>
                    <td class="col-category" title="${t.category}">${t.category}</td>
                    <td><span class="status-badge ${t.status}">${t.statusName}</span></td>
                    <td class="col-group" title="${t.group}">${t.group}</td>
                    <td>${t.technician || 'Não atribuído'}</td>

                    <td><span class="sla-badge ${t.slaSolucao === 'No prazo' ? 'sla-ok' : 'sla-late'}">${t.slaSolucao}</span></td>
                    <td>${formatDate(t.dateCreated)}</td>
                    <td>${formatDateTime(t.lastUpdate)}</td>
                </tr>
            `).join('');

            content.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                                <th class="col-id">ID</th>
                                <th class="col-instance">Instância</th>
                                <th class="col-entity">Entidade</th>
                                <th class="col-category">Categoria</th>

                            </tr>

        function exportToXlsx() {
            if (filteredTickets.length === 0) return;

            const data = filteredTickets.map(t => ({
                'ID': t.id,
                'Instância': t.instance,
                'Entidade': t.entity,
                'Categoria': t.category,
                'Status': t.statusName,
                'Grupo Responsável': t.group,
                'Técnico': t.technician || '',
                'SLA Atendimento': t.slaAtendimento || '',
                'SLA Solução': t.slaSolucao || '',
                'Data de Abertura': formatDate(t.dateCreated),
                'Última Atualização': formatDateTime(t.lastUpdate)
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Relatório');

            const dateFilter = document.getElementById('dateTypeFilter').value;
            const year = document.getElementById('yearFilter').value;
            const month = document.getElementById('monthFilter').value;
            let filename = `relatorio_tickets_${dateFilter}`;
            if (year) filename += `_${year}`;
            if (month) filename += `_${month.padStart(2, '0')}`;
            filename += `.xlsx`;

            XLSX.writeFile(wb, filename);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadAllTickets();
