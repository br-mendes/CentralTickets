<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem de Tickets - Supabase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            padding: 32px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 24px;
            text-align: center;
        }
        .instances {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .instance {
            background: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .instance-name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .instance-name.peta { color: #2563eb; }
        .instance-name.gmx { color: #7c3aed; }
        .count {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }
        .total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .loading {
            text-align: center;
            color: #64748b;
            padding: 40px;
        }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Contagem de Tickets no Supabase</h1>
        <div id="content">
            <div class="loading">Carregando...</div>
        </div>
    </div>

    <script src="app-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = window.APP_CONFIG?.SUPABASE_URL;
        const supabaseKey = window.APP_CONFIG?.SUPABASE_ANON_KEY;

        async function countTickets() {
            if (!supabaseUrl || !supabaseKey) {
                document.getElementById('content').innerHTML = 
                    '<div class="error">Configuração do Supabase não encontrada</div>';
                return;
            }

            const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

            try {
                // Count PETA
                const { count: petaCount, error: petaError } = await sb
                    .from('tickets_cache')
                    .select('*', { count: 'exact', head: true })
                    .eq('instance', 'PETA');

                // Count GMX
                const { count: gmxCount, error: gmxError } = await sb
                    .from('tickets_cache')
                    .select('*', { count: 'exact', head: true })
                    .eq('instance', 'GMX');

                if (petaError || gmxError) {
                    throw new Error(petaError?.message || gmxError?.message);
                }

                const total = (petaCount || 0) + (gmxCount || 0);

                document.getElementById('content').innerHTML = `
                    <div class="instances">
                        <div class="instance">
                            <span class="instance-name peta">🟦 PETA</span>
                            <span class="count">${petaCount || 0}</span>
                        </div>
                        <div class="instance">
                            <span class="instance-name gmx">🟪 GMX</span>
                            <span class="count">${gmxCount || 0}</span>
                        </div>
                        <div class="total">
                            <span>Total</span>
                            <span>${total}</span>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('content').innerHTML = 
                    `<div class="error">Erro: ${err.message}</div>`;
            }
        }

        countTickets();
    </script>
</body>
</html>
